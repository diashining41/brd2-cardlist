<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>브라운더스트2 카드리스트 (한글)</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --panel2:#f0f1f4; --border:#e2e4e9;
    --text:#1c1f26; --muted:#697086; --accent:#4c6ef5; --accent-soft:#e7ecfe;
    --badge:#333a4a; --shadow:0 1px 3px rgba(20,25,40,.08),0 4px 16px rgba(20,25,40,.06);
    --yellow:#e6b422; --green:#3fa860; --red:#e2564d; --blue:#4176d6;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14161c; --panel:#1c1f28; --panel2:#242835; --border:#2e3342;
      --text:#e7e9ef; --muted:#9aa1b4; --accent:#7c93ff; --accent-soft:#242c48;
      --badge:#3a4256; --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="dark"]{
    --bg:#14161c; --panel:#1c1f28; --panel2:#242835; --border:#2e3342;
    --text:#e7e9ef; --muted:#9aa1b4; --accent:#7c93ff; --accent-soft:#242c48;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#f4f5f7; --panel:#ffffff; --panel2:#f0f1f4; --border:#e2e4e9;
    --text:#1c1f26; --muted:#697086; --accent:#4c6ef5; --accent-soft:#e7ecfe;
    --shadow:0 1px 3px rgba(20,25,40,.08),0 4px 16px rgba(20,25,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    font-size:14px; line-height:1.55;
  }
  a{color:var(--accent)}

  /* ── Header ── */
  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(8px);
    background:color-mix(in srgb,var(--panel) 88%,transparent);
    border-bottom:1px solid var(--border);
  }
  .head-inner{max-width:1280px; margin:0 auto; padding:12px 18px}
  .title-row{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  h1{font-size:19px; margin:0; letter-spacing:-.2px}
  .subtitle{color:var(--muted); font-size:12.5px}
  .stats{margin-left:auto; color:var(--muted); font-size:12.5px; display:flex; gap:14px; flex-wrap:wrap}
  .stats b{color:var(--text)}

  /* ── Toolbar ── */
  .toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:11px}
  .search{
    flex:1 1 240px; min-width:180px; display:flex; align-items:center; gap:8px;
    background:var(--panel2); border:1px solid var(--border); border-radius:9px; padding:7px 11px;
  }
  .search input{border:0; background:transparent; color:var(--text); width:100%; font-size:13.5px; outline:none}
  .search svg{flex:none; opacity:.5}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    border:1px solid var(--border); background:var(--panel2); color:var(--text);
    border-radius:999px; padding:5px 12px; font-size:12.5px; cursor:pointer; user-select:none;
    display:inline-flex; align-items:center; gap:6px; transition:.12s;
  }
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600}
  .chip .dot{width:11px; height:11px; border-radius:50%; display:inline-block}
  select.ctl{
    border:1px solid var(--border); background:var(--panel2); color:var(--text);
    border-radius:9px; padding:6px 10px; font-size:12.5px; cursor:pointer;
  }
  .spacer{flex:1}

  /* ── Grid ── */
  main{max-width:1280px; margin:0 auto; padding:18px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px}
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column;
  }
  /* hidden 속성이 .card{display:flex}에 가려지지 않도록(필터 숨김이 확실히 먹도록) */
  .card[hidden]{ display:none }
  .card-top{display:flex; gap:13px; padding:13px}
  .thumb{flex:none; width:118px}
  .thumb img{width:100%; border-radius:7px; display:block; cursor:zoom-in; background:var(--panel2)}
  .info{min-width:0; flex:1}
  .name{font-weight:700; font-size:15px; line-height:1.35; letter-spacing:-.2px}
  .name .jp{display:block; font-weight:400; font-size:11.5px; color:var(--muted); margin-top:1px}
  .base-no{font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; margin-top:3px}
  .untr{display:inline-block; font-size:10.5px; font-weight:700; color:#b26b00; background:#ffe9c2;
        border-radius:5px; padding:1px 6px; margin-left:6px; vertical-align:middle}
  @media (prefers-color-scheme: dark){.untr{color:#ffcf7a; background:#4a3410}}

  .statline{display:flex; gap:6px 9px; flex-wrap:wrap; margin:8px 0; align-items:center; font-size:12px; color:var(--muted)}
  .statline .kv{display:inline-flex; gap:4px; align-items:center; white-space:nowrap}
  .statline .kv b{color:var(--text); font-weight:600}
  .ic{height:15px; width:auto; vertical-align:-3px; image-rendering:auto}
  .kind-tag{border:1px solid var(--border); border-radius:5px; padding:0 6px; font-size:11px}

  .features{display:flex; gap:5px; flex-wrap:wrap; margin:7px 0}
  .feat{background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:1px 7px; font-size:11.5px; color:var(--muted)}

  .text{font-size:12.7px; line-height:1.62; margin-top:7px; word-break:break-word}
  .text.jp{color:var(--muted); font-size:12px; border-top:1px dashed var(--border); margin-top:8px; padding-top:7px}
  .kw{border-radius:4px; padding:0 2px}
  .kw-ability{color:var(--accent); font-weight:700}
  .kw-trait{color:var(--green); font-weight:600}
  .kw-quote{color:var(--muted)}

  /* ── Variant strip ── */
  .variants{display:flex; gap:7px; padding:10px 13px 13px; overflow-x:auto; border-top:1px solid var(--border); background:var(--panel2)}
  .var{
    flex:none; width:66px; border:0; background:transparent; padding:0; cursor:zoom-in; text-align:center;
    position:relative;
  }
  .var img{width:100%; border-radius:5px; display:block; border:1px solid var(--border); background:var(--panel)}
  .var.base img{outline:2px solid var(--accent)}
  .badge{
    position:absolute; top:3px; left:3px; font-size:9px; font-weight:800; letter-spacing:.2px;
    background:var(--badge); color:#fff; border-radius:4px; padding:1px 4px; line-height:1.3;
  }
  .badge.p{background:var(--accent)}
  .vno{display:block; font-size:9.5px; color:var(--muted); margin-top:2px; font-family:ui-monospace,monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .empty{text-align:center; color:var(--muted); padding:60px 0}

  /* ── 출처·면책 푸터 ── */
  .site-foot{max-width:1280px; margin:8px auto 0; padding:18px 18px 40px; border-top:1px solid var(--border);
    color:var(--muted); font-size:11.5px; line-height:1.7; text-align:center}
  .site-foot b{color:var(--text)}
  .site-foot .en{display:block; opacity:.7; margin-top:2px}
  .site-foot a{color:var(--muted); text-decoration:underline}

  /* ── Lightbox ── */
  .lb{position:fixed; inset:0; z-index:50; background:rgba(8,10,16,.86); display:none; align-items:center; justify-content:center}
  .lb.on{display:flex}
  .lb img{max-width:min(92vw,620px); max-height:88vh; border-radius:10px; box-shadow:0 10px 50px rgba(0,0,0,.6)}
  .lb-cap{position:fixed; bottom:22px; left:0; right:0; text-align:center; color:#fff; font-size:13px}
  .lb-cap .r{font-weight:700}
  .lb-nav{position:fixed; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.12); color:#fff;
          border:0; width:48px; height:64px; font-size:26px; cursor:pointer; border-radius:9px}
  .lb-prev{left:16px} .lb-next{right:16px}
  .lb-close{position:fixed; top:16px; right:18px; background:rgba(255,255,255,.12); color:#fff; border:0;
            width:40px; height:40px; border-radius:9px; font-size:20px; cursor:pointer}
  @media(max-width:520px){.lb-nav{width:38px}}
</style>
</head>

:"純白の祝福 レピテア","nameKana":"ジュンパクノシュクフク レピテア","nameKo":"순백의 축복 레피테아","textJp":"【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋3000。\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロックの上から1枚を、控え室に置いてよい。\u003cbr>【自】【CXコンボ】［(2) 手札を1枚控え室に置く］ このカードのアタックの終わりに、CX置場に「一緒に幸せになろっ！」があるなら、あなたはコストを払ってよい。そうしたら、相手に3ダメージを与え、次の相手のターンの終わりまで、このカードのバトル中、あなたは相手のキャラの【自】の効果によるダメージを受けない。（ダメージキャンセルは発生する）","textKo":"【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +3000.\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장을 대기실에 놓아도 된다.\u003cbr>【자동】【CX콤보】［(2) 패를 1장 대기실에 놓는다］ 이 카드의 어택이 끝날 때, CX존에 「함께 행복해지자!」가 있다면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 3데미지를 주고, 다음 상대 턴이 끝날 때까지 이 카드의 배틀 중 당신은 상대 캐릭터의 【자동】 효과에 의한 데미지를 받지 않는다.（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-007","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_007.png"},{"number":"BRD/W139-007S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_007s.png"}]},{"base":"BRD/W139-008","sortNo":8,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"白い死神 ユースティア","nameKana":"シロイシニガミ ユースティア","nameKo":"하얀 사신 유스티아","textJp":"【自】 このカードが手札から舞台に置かれた時、次の行動を2回行う。『あなたは自分の山札を上から1枚見て、山札の上か控え室に置く。』\u003cbr>【自】［(1)］ あなたのトリガーアイコンが[[focus.gif]]のCXがトリガーした時、あなたはコストを払ってよい。そうしたら、あなたは自分の控え室の《RPG》のキャラを1枚選び、手札に戻す。\u003cbr>【起】［このカードを【レスト】する］ あなたは自分の《RPG》のキャラを1枚選び、そのターン中、パワーを＋1000。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 다음 행동을 2회 한다.『당신은 자신의 덱 위에서 1장을 보고, 덱 위나 대기실에 놓는다.』\u003cbr>【자동】［(1)］ 당신의 트리거 아이콘이 [[focus.gif]]인 CX가 트리거했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 대기실에서 《RPG》 캐릭터를 1장 골라 패로 되돌린다.\u003cbr>【기동】［이 카드를 【레스트】한다］ 당신은 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +1000.","translated":true,"variants":[{"number":"BRD/W139-008","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_008.png"},{"number":"BRD/W139-008S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_008s.png"}]},{"base":"BRD/W139-009","sortNo":9,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"浜辺の正義 ミカエラ","nameKana":"ハマベノセイギ ミカエラ","nameKo":"해변의 정의 미카엘라","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは他の自分の《RPG》のキャラを1枚選び、そのターン中、パワーを＋1000。\u003cbr>【起】［このカードをクロック置場に置く］ あなたは自分の山札を上から3枚まで見て、《RPG》のキャラかイベントを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 다른 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +1000.\u003cbr>【기동】［이 카드를 클록 존에 놓는다］ 당신은 자신의 덱 위에서 3장까지 보고, 《RPG》 캐릭터나 이벤트를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-009","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_009.png"},{"number":"BRD/W139-009S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_009s.png"},{"number":"BRD/W139-009SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_009sp.png"}]},{"base":"BRD/W139-010","sortNo":10,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"1","cost":"0","power":"1500","soul":"[[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"信心の翼 オリビエ","nameKana":"シンジンノツバサ オリビエ","nameKo":"신앙의 날개 올리비에","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋6000。\u003cbr>【自】［(1)］ このカードがアタックした時、他のあなたの《RPG》のキャラが2枚以上なら、あなたはコストを払ってよい。そうしたら、あなたは相手の山札を上から1枚見て、山札の上か控え室に置き、次の行動を行う。『あなたは自分の山札の上から1枚を公開してよい。そのカードが《RPG》のキャラかイベントなら、ストック置場に置く。』（そうでないなら元に戻す）","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +6000.\u003cbr>【자동】［(1)］ 이 카드가 어택했을 때, 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 상대의 덱 위에서 1장을 보고 덱 위나 대기실에 놓고, 다음 행동을 한다.『당신은 자신의 덱 위에서 1장을 공개해도 된다. 그 카드가 《RPG》 캐릭터나 이벤트라면 스톡 존에 놓는다.』（그렇지 않다면 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-010","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_010.png"},{"number":"BRD/W139-010S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_010s.png"}]},{"base":"BRD/W139-011","sortNo":11,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"1","cost":"0","power":"3500","soul":"[[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"虚無の星 グランヒルト","nameKana":"キョムノホシ グランヒルト","nameKo":"허무의 별 그란힐트","textJp":"【自】【ターン1】 あなたがイベントをプレイした時、あなたは1枚引き、自分の手札を1枚選び、控え室に置く。\u003cbr>【自】【ターン1】 あなたがイベントをプレイした時、次の2つの効果のうちあなたが選んだ1つを行う。『このカードの下にマーカーがないなら、あなたは自分の山札の上から1枚を、このカードの下にマーカーとして表向きに置く。』『あなたはこのカードの下のマーカーを1枚ストック置場に置く。』","textKo":"【자동】【턴1】 당신이 이벤트를 플레이했을 때, 당신은 1장 뽑고, 자신의 패를 1장 골라 대기실에 놓는다.\u003cbr>【자동】【턴1】 당신이 이벤트를 플레이했을 때, 다음 2개의 효과 중 당신이 고른 1개를 한다.『이 카드 아래에 마커가 없다면, 당신은 자신의 덱 위에서 1장을 이 카드 아래에 마커로 앞면으로 놓는다.』『당신은 이 카드 아래의 마커를 1장 스톡 존에 놓는다.』","translated":true,"variants":[{"number":"BRD/W139-011","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_011.png"},{"number":"BRD/W139-011S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_011s.png"},{"number":"BRD/W139-011SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_011sp.png"}]},{"base":"BRD/W139-012","sortNo":12,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"1","cost":"0","power":"4500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"カムバックアイドル ヴェンタナ","nameKana":"カムバックアイドル ヴェンタナ","nameKo":"컴백 아이돌 벤타나","textJp":"【自】 あなたのCXがCX置場に置かれ w139_028.png"},{"number":"BRD/W139-028S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_028s.png"},{"number":"BRD/W139-028SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_028sp.png"}]},{"base":"BRD/W139-029","sortNo":29,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"3","cost":"2","power":"10000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"ユルいライフガード ネブリス","nameKana":"ユルイライフガード ネブリス","nameKo":"느슨한 라이프가드 네브리스","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロックの上から1枚を、控え室に置いてよい。\u003cbr>【自】【CXコンボ】［(2) 手札を1枚控え室に置く］ このカードがアタックした時、CX置場に「POST：SUMMER KNIGHT」があるなら、あなたはコストを払ってよい。そうしたら、次の行動を2回まで行う。『あなたは自分の山札の上から1枚を公開し、相手にＸダメージを与える。Ｘはそのカードのソウルに等しい。あなたは公開したカードを控え室に置いてよい。』（イベントとCXのソウルは0として扱う。ダメージキャンセルは発生する。公開したカードを控え室に置かないなら元に戻す）","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장을 대기실에 놓아도 된다.\u003cbr>【자동】【CX콤보】［(2) 패를 1장 대기실에 놓는다］ 이 카드가 어택했을 때, CX존에 「POST：SUMMER KNIGHT」가 있다면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 다음 행동을 2회까지 한다.『당신은 자신의 덱 위에서 1장을 공개하고, 상대에게 X데미지를 준다. X는 그 카드의 소울과 같다. 당신은 공개한 카드를 대기실에 놓아도 된다.』（이벤트와 CX의 소울은 0으로 취급한다. 데미지 캔슬은 발생한다. 공개한 카드를 대기실에 놓지 않는다면 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-029","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_029.png"},{"number":"BRD/W139-029S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_029s.png"},{"number":"BRD/W139-029SSP","rare":"SSP","rareKo":"슈퍼스페셜(SSP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_029ssp.png"}]},{"base":"BRD/W139-030","sortNo":30,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]][[soul.gif]]","trigger":"-","featuresJp":["RPG","オフィス"],"featuresKo":["RPG","오피스"],"nameJp":"契約奪取者 ルベンシア","nameKana":"ケイヤクダッシュシャ ルベンシア","nameKo":"계약 강탈자 루벤시아","textJp":"【自】［手札のトリガーアイコンが[[treasure.gif]]のCXを1枚控え室に置く］ このカードが手札から舞台に置かれた時か舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を上から5枚まで見て、《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。\u003cbr>【自】 あなたのトリガーアイコンが[[treasure.gif]]のCXがCX置場に置かれた時、あなたは自分の山札を上から2枚まで見て、カードを2枚まで選び、山札の上に好きな順番で置き、残りのカードを控え室に置く。","textKo":"【자동】［패의 트리거 아이콘이 [[treasure.gif]]인 CX를 1장 대기실에 놓는다］ 이 카드가 패에서 무대에 놓였을 때나 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 5장까지 보고, 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.\u003cbr>【자동】 당신의 트리거 아이콘이 [[treasure.gif]]인 CX가 CX존에 놓였을 때, 당신은 자신의 덱 위에서 2장까지 보고, 카드를 2장까지 골라 덱 위에 원하는 순서로 놓고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-030","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_030.png"},{"number":"BRD/W139-030S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_030s.png"},{"number":"BRD/W139-030SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_030sp.png"}]},{"base":"BRD/W139-031","sortNo":31,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]][[soul.gif]]","trigger":"-","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"イノセント・バニー ティル","nameKana":"イノセント・バニー ティル","nameKo":"이노센트 버니 틸","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは自分の山札を上から3枚まで見て、ソウルが2以上のキャラを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。手札に加えたなら、あなたは自分の手札を1枚選び、控え室に置く。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 덱 위에서 3장까지 보고, 소울이 2 이상인 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다. 패에 넣었다면, 당신은 자신의 패를 1장 골라 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-031","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_031.png"},{"number":"BRD/W139-031S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_031s.png"}]},{"base":"BRD/W139-032","sortNo":32,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"1","cost":"0","power":"1000","soul":"[[soul.gif]][[soul.gif]]","trigger":"-","featuresJp":["RPG","オフィス"],"featuresKo":["RPG","오피스"],"nameJp":"新入社員 セイル","nameKana":"シニュウシャイン セイル","nameKo":"신입사원 세일","textJp":"【永】 あなたのキャラすべてが《RPG》なら、このカードのパワーを＋3000。\u003cbr>【自】 このカードのバトル中、あなたの受けたダメージがキャンセルされなかった時、そのターン中、このカードのパワーを＋6000。","textKo":"【영속】 당신의 캐릭터 모두가 《RPG》라면, 이 카드의 파워를 +3000.\u003cbr>【자동】 이 카드의 배틀 중, 당신이 받은 데미지가 캔슬되지 않았을 때, 그 턴 중 이 카드의 파워를 +6000.","translated":true,"variants":[{"number":"BRD/W139-032","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_032.png"},{"number":"BRD/W139-032S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_032s.png"}]},{"base":"BRD/W139-033","sortNo":33,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"1","cost":"0","power":"4500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"公女 ブレイド","nameKana":"コウジョ ブレイド","nameKo":"공녀 블레이드","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋1500。\u003cbr>【自】【CXコンボ】 このカードのバトル相手が【リバース】した時、あなたのCX置場に「冷徹な情熱」があるなら、次の2つの効果のうちあなたが選んだ1つを行う。『あなたは自分の山札を上から6枚まで見て、《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。』『あなたは自分の控え室の《RPG》のキャラを1枚選び、手札に戻す。』","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +1500.\u003cbr>【자동】【CX콤보】 이 카드의 배틀 상대가 【리버스】했을 때, 당신의 CX존에 「냉철한 정열」이 있다면, 다음 2개의 효과 중 당신이 고른 1개를 한다.『당신은 자신의 덱 위에서 6장까지 보고, 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.』『당신은 자신의 대기실에서 《RPG》 캐릭터를 1장 골라 패로 되돌린다.』","translated":true,"variants":[{"number":"BRD/W139-033","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_033.png"},{"number":"BRD/W139-033S","rare":"SR","rareKo":"스페셜레어","isBase":false のキャラを1枚まで選んで相手に見せ、手札に加え、その山札をシャッフルする。","textKo":"【기동】［이 카드를 【레스트】한다］ 당신은 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +1000.\u003cbr>【기동】［패를 1장 대기실에 놓고, 이 카드를 대기실에 놓는다］ 당신은 자신의 덱을 보고 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 그 덱을 셔플한다.","translated":true,"variants":[{"number":"BRD/W139-037","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_037.png"},{"number":"BRD/W139-037S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_037s.png"}]},{"base":"BRD/W139-038","sortNo":38,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]][[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"サマーバカンス キュウビ","nameKana":"サマーバカンス キュウビ","nameKo":"서머 바캉스 큐비","textJp":"【永】 前列の中央の枠にこのカードがいないなら、このカードのソウルを－1。\u003cbr>【自】 このカードが手札から舞台に置かれた時、そのターン中、このカードのパワーを＋1500。\u003cbr>【自】【CXコンボ】［手札を1枚控え室に置き、あなたのCX置場の「妖力の嵐」を1枚控え室に置く］ あなたのアンコールステップの始めに、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を上から3枚まで見て、《RPG》のキャラを3枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。","textKo":"【영속】 앞열 가운데 칸에 이 카드가 없다면, 이 카드의 소울을 -1.\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 그 턴 중 이 카드의 파워를 +1500.\u003cbr>【자동】【CX콤보】［패를 1장 대기실에 놓고, 당신의 CX존의 「요력의 폭풍」을 1장 대기실에 놓는다］ 당신의 앙코르 스텝 시작에, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 3장까지 보고, 《RPG》 캐릭터를 3장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-038","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_038.png"},{"number":"BRD/W139-038S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_038s.png"},{"number":"BRD/W139-038SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_038sp.png"}]},{"base":"BRD/W139-039","sortNo":39,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1500",  1장을 스톡 존에 놓아도 된다）","translated":true,"variants":[{"number":"BRD/W139-053","rare":"CR","rareKo":"클라이맥스레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_053.png"},{"number":"BRD/W139-053R","rare":"RRR","rareKo":"트리플레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_053r.png"}]},{"base":"BRD/W139-054","sortNo":54,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","未来"],"featuresKo":["RPG","미래"],"nameJp":"セレブリティ・バニー ロエン","nameKana":"セレブリティ・バニー ロエン","nameKo":"셀러브리티 버니 로엔","textJp":"【自】 このカードが手札から舞台に置かれた時、他のあなたの《RPG》のキャラが2枚以上なら、そのターン中、このカードのパワーを＋2500し、あなたは1枚引いてよい。そうしたら、あなたは自分の手札を1枚選び、控え室に置く。\u003cbr>【自】 このカードが手札から舞台に置かれたターン中、このカードがアタックした時、次の行動を2回行う。『［手札を1枚クロック置場に置く］ あなたはコストを払ってよい。そうしたら、あなたは自分の山札を見て《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、その山札をシャッフルする。』","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 그 턴 중 이 카드의 파워를 +2500하고, 당신은 1장 뽑아도 된다. 그렇게 했다면, 당신은 자신의 패를 1장 골라 대기실에 놓는다.\u003cbr>【자동】 이 카드가 패에서 무대에 놓인 턴 중, 이 카드가 어택했을 때, 다음 행동을 2회 한다.『［패를 1장 클록 존에 놓는다］ 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱을 보고 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 그 덱을 셔플한다.』","translated":true,"variants":[{"number":"BRD/W139-054","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_054.png"},{"number":"BRD/W139-054S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_054s.png"},{"number":"BRD/W139-054SSP","rare":"SSP","rareKo":"슈퍼스페셜(SSP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_054ssp.png"}]},{"base":"BRD/W139-055","sortNo":55,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"メイドビキニ ルヴィア","nameKana":"メイドビキニ ルヴィア","nameKo":"메이드비키니 루비아","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【自】【CXコンボ】 あなたのCX置場に「シークレット・オーダー」が置かれた時、前列にこのカードがいて、他のあなたの《RPG》のキャラが3枚以上なら、次の相手のターンの終わりまで、このカードは次の2つの能力を得る。『【自】 このカードがアタックした時、あなたは自分の山札を上から2枚まで見て、カードを1枚選び、山札の上に置き、残りのカードを控え室に置く。』『【自】 このカードがフロントアタックされた時か舞台から控え室に置かれた時、あなたはこのカードを手札に戻してよい。』","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【자동】【CX콤보】 당신의 CX존에 「시크릿 오더」가 놓였을 때, 앞열에 이 카드가 있고 다른 당신의 《RPG》 캐릭터가 3장 이상이면, 다음 상대 턴이 끝날 때까지 이 카드는 다음 2개의 능력을 얻는다.『【자동】 이 카드가 어택했을 때, 당신은 자신의 덱 위에서 2장까지 보고, 카드를 1장 골라 덱 위에 놓고, 남은 카드를 대기실에 놓는다.』『【자동】 이 카드가 프론트어택당했을 때나 무대에서 대기실에 놓였을 때, 당신은 이 카드를 패로 되돌려도 된다.』","translated":true,"variants":[{"number":"BRD/W139-055","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_055.png"},{"number":"BRD/W139-055S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_055s.png"},{"number":"BRD/W139-055SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_055sp.png"}]},{"base":"BRD/W139-056","sortNo":56,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","未来"],"featuresKo":["RPG","미래"],"nameJp":"ファイアグラフィティ アナスタシア","nameKana":"ファイアグラフィティ アナスタシア","nameKo":"파이어 그래피티 아나스타시아","textJp":"【自】［(1) 手札のキャラを1枚控え室に置く］ あなたのCXフェイズの始めに、あなたはコストを払ってよい。そうしたら、あなたは相手のキャラを2枚選び、それぞれを【スタンド】して入れ替える。\u003cbr>【起】 集中 ［(1) このカードを【レスト】する］ あなたは自分の山札の上から4枚をめくり、控え室に置く。それらのカードのCX1枚につき、あなたは自分の控え室のキャラを1枚まで選び、手札に戻す。","textKo":"【자동】［(1) 패의 캐릭터를 1장 대기실에 놓는다］ 당신의 CX 페이즈 시작에, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 상대 캐릭터를 2장 골라, 각각을 【스탠드】해서 서로 바꾼다.\u003cbr>【기동】 집중 ［(1) 이 카드를 【레스트】한다］ 당신은 자신의 덱 위에서 4장을 넘겨 대기실에 놓는다. 그 카드들의 CX 1장당, 당신은 자신의 대기실에서 캐릭터를 1장까지 골라 패로 되돌린다.","translated":true,"variants":[{"number":"BRD/W139-056","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_056.png"},{"number":"BRD/W139-056S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_056s.png"}]},{"base":"BRD/W139-057","sortNo":57,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"暗黒聖女 リベルタ","nameKana":"アンコクセイジョ リベルタ","nameKo":"암흑 성녀 리베르타","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【起】［(1) このカードを控え室に置く］ あなたのレベルが3以上なら、あなたは相手のキャラを1枚選び、【スタンド】して相手の舞台のキャラのいない他の枠に動かすか、他の相手のキャラを1枚選び、それぞれを【スタンド】して入れ替える。","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【기동】［(1) 이 카드를 대기실에 놓는다］ 당신의 레벨이 3 이상이면, 당신은 상대 캐릭터를 1장 골라 【스탠드】해서 상대 무대의 캐릭터가 없는 다른 칸으로 이동시키거나, 다른 상대 캐릭터를 1장 골라 각각을 【스탠드】해서 서로 바꾼다.","translated":true,"variants":[{"number":"BRD/W139-057","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_057.png"},{"number":"BRD/W139-057S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_057s.png"}]},{"base":"BRD/W139-058","sortNo":58,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"1","power":"3500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"最後の希望 ロエン","nameKana":"サイゴノキボウ ロエン","nameKo":"최후의 희망 로엔","textJp":"【永】 このカードの正面のキャラのコストが0以下なら、このカードは【リバース】しない。\u003cbr>【自】［(2)］ このカードがアタックした時、あなたはコストを払ってよい。そうしたら、そのアタック中、あなたはトリガーステップにトリガーチェックを3回行う。","textKo":"【영속】 이 카드 정면의 캐릭터의 코스트가 0 이하라면, 이 카드는 【리버스】하지 않는다.\u003cbr>【자동】［(2)］ 이 카드가 어택했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 그 어택 중, 당신은 트리거 스텝에 트리거 체크를 3회 한다.","translated":true,"variants":[{"number":"BRD/W139-058","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_058.png"},{"number":"BRD/W139-058S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_058s.png"}]},{"base":"BRD/W139-059","sortNo":59,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"8500","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"メイドネームC ルヴィア","nameKana":"メイドネームC ルヴィア","nameKo":"메이드네임C 루비아","textJp":"【永】 あなたの《RPG》のキャラが4枚以上なら、あなたの手札のこのカードのレベルを－1。\u003cbr>【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋1500し、このカードは次の能力を得る。『【自】 このカードのバトル相手が【リバース】した時、あなたはこのカードを手札に戻してよい。』\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロックの上から1枚を、控え室に置いてよい。","textKo":"【영속】 당신의 《RPG》 캐릭터가 4장 이상이면, 당신의 패에 있는 이 카드의 레벨을 -1.\u003cbr>【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +1500하고 이 카드는 다음 능력을 얻는다.『【자동】 이 카드의 배틀 상대가 【리버스】했을 때, 당신은 이 카드를 패로 되돌려도 된다.』\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장을 대기실에 놓아도 된다.","translated":true,"variants":[{"number":"BRD/W139-059","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_059.png"},{"number":"BRD/W139-059S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_059s.png"}]},{"base":"BRD/W139-060","sortNo":60,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"10000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"メイドネームR リアトリス","nameKana":"メイドネームR リアトリス","nameKo":"메이드네임R 리아트리스","textJp":"【永】 前列にこのカードがいるなら、あなたの《RPG》のキャラすべてに、パワーを＋1500。\u003cbr>【自】【CXコンボ】 あなたのアンコールステップの始めに、CX置場に「メイド・ラブ♡ファイヤー」があり、前列にこのカードがいるなら、次の2つの効果のうちあなたが選んだ1つを行う。『［(1) 手札を1枚控え室に置く］ あなたはコストを払ってよい。そうしたら、相手に2ダメージを与える。』『［(2) 手札を1枚控え室に置く］ あなたはコストを払ってよい。そうしたら、相手に3ダメージを与える。』（ダメージキャンセルは発生する）","textKo":"【영속】 앞열에 이 카드가 있다면, 당신의 《RPG》 캐릭터 모두에게 파워를 +1500.\u003cbr>【자동】【CX콤보】 당신의 앙코르 스텝 시작에, CX존에 「메이드 러브♡파이어」가 있고 앞열에 이 카드가 있다면, 다음 2개의 효과 중 당신이 고른 1개를 한다.『［(1) 패를 1장 대기실에 놓는다］ 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 2데미지를 준다.』『［(2) 패를 1장 대기실에 놓는다］ 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 3데미지를 준다.』（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-060","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_060.png"},{"number":"BRD/W139-060S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_060s.png"},{"number":"BRD/W139-060SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_060sp.png"}]},{"base":"BRD/W139-061","sortNo":61,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"温泉管理人 リベルタ","nameKana":"オンセンカンリニン リベルタ","nameKo":"온천 관리인 리베르타","textJp":"【自】［(1)］ あなたのトリガーアイコンが[[salvage.gif]]のCXがトリガーした時、あなたはコストを払ってよい。そうしたら、あなたは1枚引く。\u003cbr>【自】【CXコンボ】 あなたのCX置場に「これこそが真の楽園」が置かれた時、あなたは他の自分の《RPG》のキャラを1枚選び、そのターン中、次の能力を与える。『【自】 このカードがアタックした時、あなたは自分の山札の上から1枚を公開する。そのカードが《RPG》のキャラなら手札に加える。』（そうでないなら元に戻す）","textKo":"【자동】［(1)］ 당신의 트리거 아이콘이 [[salvage.gif]]인 CX가 트리거했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 1장 뽑는다.\u003cbr>【자동】【CX콤보】 당신의 CX존에 「이것이야말로 진정한 낙원」이 놓였을 때, 당신은 다른 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【자동】 이 카드가 어택했을 때, 당신은 자신의 덱 위에서 1장을 공개한다. 그 카드가 《RPG》 캐릭터라면 패에 넣는다.』（그렇지 않다면 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-061","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_061.png"},{"number":"BRD/W139-061S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_061s.png"}]},{"base":"BRD/W139-062","sortNo":62,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"陸上 キャラがいるなら、次の相手のターンの終わりまで、このカードのパワーを＋4000。\u003cbr>【自】【CXコンボ】［手札を1枚控え室に置く］ このカードがアタックした時、CX置場に「真夏のシューター」があるなら、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を上から4枚まで公開し、カードを4枚まで選び、山札の上に好きな順番で置き、残りのカードを控え室に置き、相手にＸダメージを与える。Ｘは公開されたカードのCXの枚数に等しい。その山札をシャッフルしてよい。（ダメージキャンセルは発生する）","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장까지를 대기실에 놓고, 다른 당신의 《RPG》 캐릭터가 있다면, 다음 상대 턴이 끝날 때까지 이 카드의 파워를 +4000.\u003cbr>【자동】【CX콤보】［패를 1장 대기실에 놓는다］ 이 카드가 어택했을 때, CX존에 「한여름의 슈터」가 있다면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 4장까지 공개하고, 카드를 4장까지 골라 덱 위에 원하는 순서로 놓고, 남은 카드를 대기실에 놓고, 상대에게 X데미지를 준다. X는 공개된 카드의 CX 매수와 같다. 그 덱을 셔플해도 된다.（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-076","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_076.png"},{"number":"BRD/W139-076S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_076s.png"},{"number":"BRD/W139-076SSP","rare":"SSP","rareKo":"슈퍼스페셜(SSP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_076ssp.png"}]},{"base":"BRD/W139-077","sortNo":77,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"3","cost":"2","power":"8000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"フローズン・クイーン ウィルヘルミナ","nameKana":"フローズン・クイーン ウィルヘルミナ","nameKo":"프로즌 퀸 빌헬미나","textJp":"【永】 あなたの《RPG》のキャラが4枚以上なら、あなたの手札のこのカードのレベルを－1。\u003cbr>【永】 あなたのターン中、このカードのパワーを＋2000。\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロックの上から1枚までを、控え室に置き、他のあなたの《RPG》のキャラが3枚以上なら、次の相手のターンの終わりまで、このカードは次の能力を得る。『【自】 このカードがフロントアタックされた時、あなたは自分の山札を上から1枚見て、山札の上か控え室に置く。』","textKo":"【영속】 당신의 《RPG》 캐릭터가 4장 이상이면, 당신의 패에 있는 이 카드의 레벨을 -1.\u003cbr>【영속】 당신의 턴 중, 이 카드의 파워를 +2000.\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장까지를 대기실에 놓고, 다른 당신의 《RPG》 캐릭터가 3장 이상이면, 다음 상대 턴이 끝날 때까지 이 카드는 다음 능력을 얻는다.『【자동】 이 카드가 프론트어택당했을 때, 당신은 자신의 덱 위에서 1장을 보고 덱 위나 대기실에 놓는다.』","translated":true,"variants":[{"number":"B 札に加え、その山札をシャッフルする。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 당신은 1장 뽑아도 된다. 그렇게 했다면, 당신은 자신의 패를 1장 골라 대기실에 놓는다.\u003cbr>【자동】［(1) 패를 1장 대기실에 놓는다］ 이 카드가 패에서 무대에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱을 보고 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 그 덱을 셔플한다.","translated":true,"variants":[{"number":"BRD/W139-079","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_079.png"},{"number":"BRD/W139-079S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_079s.png"}]},{"base":"BRD/W139-080","sortNo":80,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"0","cost":"0","power":"2000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"ビーチバカンス エクリプス","nameKana":"ビーチバカンス エクリプス","nameKo":"비치 바캉스 이클립스","textJp":"【自】［あなたの控え室の《RPG》のキャラを1枚クロック置場の下に置く］ このカードが手札から舞台に置かれた時、あなたはコストを払ってよい。そうしたら、あなたは自分の山札の上から1枚を、ストック置場に置く。","textKo":"【자동】［당신의 대기실의 《RPG》 캐릭터를 1장 클록 존 아래에 놓는다］ 이 카드가 패에서 무대에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 1장을 스톡 존에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-080","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_080.png"},{"number":"BRD/W139-080S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_080s.png"},{"number":"BRD/W139-080SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_080sp.png"}]},{"base":"BRD/W139-081","sortNo":81,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"2000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"ビーチバカンス モルフェア","nameKana":"ビーチバカンス モルフェア","nameKo":"비치 바캉스 모르페아","textJp":"【自】［手札のレベル1以上のカードを1枚控え室に置く］ あなたのメインフェイズ中、このカードが手札から舞台に置かれた時、あなたはコストを払ってよい。そうしたら、あなたは自分の控え室の自分のレベル以下のレベルの《RPG》のキャラを1枚選び、そのメインフェイズ中、そのカードを、色条件を満たさずに控え室からプレイしてよい。（CXのレベルは0として扱う。コストが必要なカードならコストを払う）\u003cbr>【起】［このカードを【レスト】する］ あなたは自分の《RPG》のキャラを1枚選び、そのターン中、パワーを＋3500。","textKo":"【자동】［패의 레벨 1 이상인 카드를 1장 대기실에 놓는다］ 당신의 메인 페이즈 중, 이 카드가 패에서 무대에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 대기실에서 자신의 레벨 이하 레벨인 《RPG》 캐릭터를 1장 골라, 그 메인 페이즈 중 그 카드를 색 조건을 만족하지 않고 대기실에서 플레이해도 된다.（CX의 레벨은 0으로 취급한다. 코스트가 필요한 카드라면 코스트를 지불한다）\u003cbr>【기동】［이 카드를 【레스트】한다］ 당신은 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +3500.","translated":true,"variants":[{"number":"BRD/W139-081","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_081.png"},{"number":"BRD/W139-081S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_081s.png"},{"number":"BRD/W139-081SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_081sp.png"}]},{"base":"BRD/W139-082","sortNo":82,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"3500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"自然の爪 ルゥ","nameKana":"シゼンノツメ ルゥ","nameKo":"자연의 발톱 루","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【自】 相手のアタックフェイズの始めに、あなたのキャラすべてが《RPG》なら、あなたは自分の山札の上から1枚を、控え室に置いてよい。そのカードがレベル2以下のキャラなら、そのターン中、このカードは次の能力を得る。『【自】 このカードがフロントアタックされた時、あなたはこのカードを手札に戻してよい。』","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【자동】 상대의 어택 페이즈 시작에, 당신의 캐릭터 모두가 《RPG》라면, 당신은 자신의 덱 위에서 1장을 대기실에 놓아도 된다. 그 카드가 레벨 2 이하 캐릭터라면, 그 턴 중 이 카드는 다음 능력을 얻는다.『【자동】 이 카드가 프론트어택당했을 때, 당신은 이 카드를 패로 되돌려도 된다.』","translated":true,"variants":[{"number":"BRD/W139-082","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_082.png"},{"number":"BRD/W139-082S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_082s.png"},{"number":"BRD/W139-082 3cbr>【기동】【카운터】 조력2500 레벨2 ［(1) 패의 이 카드를 대기실에 놓는다］ （당신은 프론트어택당하고 있는 자신의 캐릭터를 1장 골라 그 턴 중 파워를 +2500）","translated":true,"variants":[{"number":"BRD/W139-090","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_090.png"},{"number":"BRD/W139-090S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_090s.png"}]},{"base":"BRD/W139-091","sortNo":91,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"0","cost":"0","power":"2000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","未来"],"featuresKo":["RPG","미래"],"nameJp":"デイドリーム・バニー モルフェア","nameKana":"デイドリーム・バニー モルフェア","nameKo":"데이드림 버니 모르페아","textJp":"【起】［あなたのキャラを2枚【レスト】する］ 他のあなたの《RPG》のキャラが4枚以上なら、あなたは自分のキャラを1枚選び、そのターン中、次の能力を与える。『【自】 このカードが【リバース】した時、このカードのバトル相手のレベルがこのカードのレベル以下なら、あなたはそのキャラを山札の下に置いてよい。』","textKo":"【기동】［당신의 캐릭터를 2장 【레스트】한다］ 다른 당신의 《RPG》 캐릭터가 4장 이상이면, 당신은 자신의 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【자동】 이 카드가 【리버스】했을 때, 이 카드의 배틀 상대의 레벨이 이 카드의 레벨 이하라면, 당신은 그 캐릭터를 덱 아래에 놓아도 된다.』","translated":true,"variants":[{"number":"BRD/W139-091","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_091.png"},{"number":"BRD/W139-091S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_091s.png"}]},{"base":"BRD/W139-092","sortNo":92,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"2500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"コードネームS シェラザード","nameKana":"コードネームS シェラザード","nameKo":"코드네임S 셰에라자드","textJp":"【永】 あなたのターン中、このカードのパワーを＋3000。\u003cbr>【自】 このカードが手札から舞台に置かれた時、そのターン中、このカードは次の能力を得る。『【永】 このカードのバトル中、相手はイベントを手札からプレイできない。』","textKo":"【영속】 당신의 턴 중, 이 카드의 파워를 +3000.\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 그 턴 중 이 카드는 다음 능력을 얻는다.『【영속】 이 카드의 배틀 중, 상대는 이벤트를 패에서 플레이할 수 없다.』","translated":true,"variants":[{"number":"BRD/W139-092","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_092.png"},{"number":"BRD/W139-092S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_092s.png"}]},{"base":"BRD/W139-093","sortNo":93,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"破壊の天使 テレーゼ","nameKana":"ハカイノテンシ テレーゼ","nameKo":"파괴의 천사 테레제","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【自】［手札のトリガーアイコンが[[gate.gif]]のCXを1枚控え室に置く］ このカードが手札から舞台に置かれた時か舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を上から5枚まで見て、《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【자동】［패의 트리거 아이콘이 [[gate.gif]]인 CX를 1장 대기실에 놓는다］ 이 카드가 패에서 무대에 놓였을 때나 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 5장까지 보고, 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-093","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_093.png"},{"number":"BRD/W139-093S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_093s.png"}]},{"base":"BRD/W139-094","sortNo":94,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"大魔女の末裔 セリア","nameKana":"ダイマジョノマツエイ セリア","nameKo":"대마녀의 후예 세리아","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラが3枚以上なら、このカードのパワーを＋4000。\u003cbr>【自】【CXコンボ】 このカードのバトル相手が【リバース】した時、あなたのCX置場に「異教の塔」があり、他のあなたの《RPG》のキャラがいるなら、次の3つの効果を1回ずつ行う。『あなたは自分の控え室の《RPG》のキャラを1枚選び、手札に戻してよい。』『あなたは自分の手札のカードとレベル置場の《RPG》のキャラを1枚ずつ選び、入れ替えてよい。』『あなたは自分のストックの上から1枚を、手札に戻してよい。そうしたら、あなたは自分の手札を1枚選び、ストック置場に置く。』","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 3장 이상이면, 이 카드의 파워를 +4000.\u003cbr>【자동】【CX콤보】 이 카드의 배틀 상대가 【리버스】했을 때, 당신의 CX존에 「이교의 탑」이 있고 다른 당신의 《RPG》 캐릭터가 있다면, 다음 3개의 효과를 1회씩 실행한다.『당신은 자신의 대기실에서 《RPG》 캐릭터를 1장 골라 패로 되돌려도 된다.』『당신은 자신의 패의 카드와 레벨 존의 《RPG》 캐릭터를 1장씩 골라 서로 바꿔도 된다.』『당신은 자신의 스톡 위에서 1장을 패로 되돌려도 된다. 그렇게 했다면, 당신은 자신의 패를 1장 골라 스톡 존에 놓는다.』","translated":true,"variants":[{"number":"BRD/W139-094","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_094.png"},{"number":"BRD/W139-094S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_094s.png"},{"number":"BRD/W139-094SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_094sp.png"}]},{"base":"BRD/W139-095","sortNo":95,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"2","cost":"1","power":"4000","soul":"[[soul.gif]][[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"風紀委員会 グレイシア","nameKana":"フウキイインカイ グレイシア","nameKo":"풍기위원회 그레이시아","textJp":"【自】 このカードが【リバース】した時、このカードのバトル相手のレベルが相手のレベルより高いなら、あなたはそのキャラを山札の下に置いてよい。\u003cbr>【自】 アンコール ［手札の《RPG》のキャラを1枚控え室に置く］ （このカードが舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、このカードがいた枠に【レスト】して置く）","textKo":"【자동】 이 카드가 【리버스】했을 때, 이 카드의 배틀 상대의 레벨이 상대 레벨보다 높다면, 당신은 그 캐릭터를 덱 아래에 놓아도 된다.\u003cbr>【자동】 앙코르 ［패의 《RPG》 캐릭터를 1장 대기실에 놓는다］ （이 카드가 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 이 카드가 있던 칸에 【레스트】해서 놓는다）","translated":true,"variants":[{"number":"BRD/W139-095","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_095.png"},{"number":"BRD/W139-095S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_095s.png"}]},{"base":"BRD/W139-096","sortNo":96,"expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"2","cost":"1","power":"5500" esKo":["RPG","오리지널"],"nameJp":"堕ちた翼 オリビエ","nameKana":"オチタツバサ オリビエ","nameKo":"추락한 날개 올리비에","textJp":"【永】 あなたのターン中、このカードのパワーを＋9000。\u003cbr>【自】［あなたの山札の上から1枚をクロック置場に置き、手札を1枚控え室に置く］ このカードのバトル相手が【リバース】した時、あなたはコストを払ってよい。そうしたら、あなたは相手の山札の下から4枚を、控え室に置き、相手にＸダメージを与える。ＸはそれらのカードのCXの枚数に等しい。（ダメージキャンセルは発生する）","textKo":"【영속】 당신의 턴 중, 이 카드의 파워를 +9000.\u003cbr>【자동】［당신의 덱 위에서 1장을 클록 존에 놓고, 패를 1장 대기실에 놓는다］ 이 카드의 배틀 상대가 【리버스】했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 상대의 덱 맨 아래에서 4장을 대기실에 놓고, 상대에게 X데미지를 준다. X는 그 카드들의 CX 매수와 같다.（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-T04","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t04.png"},{"number":"BRD/W139-T04S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t04s.png"}]},{"base":"BRD/W139-T05","sortNo":1005,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"2","cost":"1","power":"3500","soul":"[[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"貪欲の星 レピテア","nameKana":"ドンヨクノホシ レピテア","nameKo":"탐욕의 별 레피테아","textJp":"【永】 他のあなたの《RPG》のキャラすべてに、パワーを＋1000。\u003cbr>【起】［このカードを【レスト】する］ あなたは1枚引き、自分の手札を1枚選び、控え室に置く。","textKo":"【영속】 다른 당신의 《RPG》 캐릭터 모두에게 파워를 +1000.\u003cbr>【기동】［이 카드를 【레스트】한다］ 당신은 1장 뽑고, 자신의 패를 1장 골라 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-T05","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t05.png"},{"number":"BRD/W139-T05S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t05s.png"}]},{"base":"BRD/W139-T06","sortNo":1006,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"9000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"スノーホワイト ヴェンタナ","nameKana":"スノーホワイト ヴェンタナ","nameKo":"스노우 화이트 벤타나","textJp":"【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋2500し、このカードは次の能力を得る。『【永】 このカードのバトル中、あなたは相手のキャラの【自】の効果によるダメージを受けない。』\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分の山札を上からＸ枚まで見て、カードを1枚まで選び、手札に加え、残りのカードを控え室に置く。Ｘはあなたの《RPG》のキャラの枚数に等しい。","textKo":"【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +2500하고 이 카드는 다음 능력을 얻는다.『【영속】 이 카드의 배틀 중, 당신은 상대 캐릭터의 【자동】 효과에 의한 데미지를 받지 않는다.』\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 덱 위에서 X장까지 보고, 카드를 1장까지 골라 패에 넣고, 남은 카드를 대기실에 놓는다. X는 당신의 《RPG》 캐릭터의 매수와 같다.","translated":true,"variants":[{"number":"BRD/W139-T06","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t06.png"},{"number":"BRD/W139-T06S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t06s.png"}]},{"base":"BRD/W139-T07","sortNo":1007,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"9000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"鮮血の騎士 ユースティア","nameKana":"センケツノキシ ユースティア","nameKo":"선혈의 기사 유스티아","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロック置場の《RPG》のキャラを1枚まで選び、山札の上か控え室に置く。\u003cbr>【自】【CXコンボ】 このカードがアタックした時、CX置場に「悪を退けるのが、我が使命」があるなら、そのターン中、このカードのパワーを＋3000し、あなたは自分の山札の上から1枚を公開する。そのカードが《RPG》のキャラなら、相手に3ダメージを与える。（ダメージキャンセルは発生する。公開したカードは元に戻す）","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 존의 《RPG》 캐릭터를 1장까지 골라 덱 위나 대기실에 놓는다.\u003cbr>【자동】【CX콤보】 이 카드가 어택했을 때, CX존에 「악을 물리치는 것이, 나의 사명」이 있다면, 그 턴 중 이 카드의 파워를 +3000하고, 당신은 자신의 덱 위에서 1장을 공개한다. 그 카드가 《RPG》 캐릭터라면, 상대에게 3데미지를 준다.（데미지 캔슬은 발생한다. 공개한 카드는 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-T07","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t07.png"},{"number":"BRD/W139-T07S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t07s.png"},{"number":"BRD/W139-T07SP","rare brd_w139_t11.png"},{"number":"BRD/W139-T11S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t11s.png"},{"number":"BRD/W139-T11SP","rare":"TDSP","rareKo":"트라이얼덱 사인","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t11sp.png"}]},{"base":"BRD/W139-T12","sortNo":1012,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"0","cost":"0","power":"3000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"砂漠の華 シルヴィア","nameKana":"サバクノハナ シルヴィア","nameKo":"사막의 꽃 실비아","textJp":"-","textKo":null,"translated":true,"variants":[{"number":"BRD/W139-T12","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t12.png"},{"number":"BRD/W139-T12S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t12s.png"}]},{"base":"BRD/W139-T13","sortNo":1013,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"蒼の魔女 シェラザード","nameKana":"アオノマジョ シェラザード","nameKo":"푸른 마녀 셰에라자드","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋4000。\u003cbr>【自】【CXコンボ】 このカードがアタックした時、CX置場に「蒼き水の魔法」があり、他のあなたの《RPG》のキャラが2枚以上なら、あなたは自分の山札を上から4枚まで見て、《RPG》のキャラかイベントを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +4000.\u003cbr>【자동】【CX콤보】 이 카드가 어택했을 때, CX존에 「푸른 물의 마법」이 있고 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 당신은 자신의 덱 위에서 4장까지 보고, 《RPG》 캐릭터나 이벤트를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-T13","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t13.png"},{"number":"BRD/W139-T13S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t13s.png"},{"number":"BRD/W139-T13SP","rare":"TDSP","rareKo":"트라이얼덱 사인","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t13sp.png"}]},{"base":"BRD/W139-T14","sortNo":1014,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"呪いの星 セリア","nameKana":"ノロイノホシ セリア","nameKo":"저주의 별 세리아","textJp":"【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋2000。\u003cbr>【自】 アンコール ［手札のキャラを1枚控え室に置く］ （このカードが舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、このカードがいた枠に【レスト】して置く）","textKo":"【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +2000.\u003cbr>【자동】 앙코르 ［패의 캐릭터를 1장 대기실에 놓는다］ （이 카드가 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 이 카드가 있던 칸에 【레스트】해서 놓는다）","translated":true,"variants":[{"number":"BRD/W139-T14","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t14.png"},{"number":"BRD/W139-T14S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t14s.png"}]},{"base":"BRD/W139-T15","sortNo":1015,"expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"2","cost":"1","power":"1500","soul":"[[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"ロビンフッド ジェニス","nameKana":"ロビンフッド ジェニス","nameKo":"로빈 후드 제니스","textJp":"【起】【カウンター】 助太刀3500 レベル2 ［(1) 手札のこのカードを控え室に置く］ （あなたは自分のフロントアタックされているキャラを1枚選び、そのターン中、パワーを＋3500）","textKo":"【기동】【카운터】 조력3500 레벨2 ［(1) 패의 이 카드를 대기실에 놓는다］ （당신은 프론트어택당하고 있는 자신의 캐릭터를 1장 골라 그 턴 중 파워를 +3500）","translated":true,"variants":[{"number":"BRD/W139-T15","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t15.png"},{"number":"BRD/W139-T15S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t15s.png"}]},{"base":"BRD/W139-T16","sortNo":1016,"expKind":"trial","expLabel":"트라이얼덱","kind":"이벤트","kindRaw":"3","color":"blue.gif","colorKo":"파랑","level":"3","cost":"1","power":"-","soul":"-","trigger":"-","featuresJp":[],"featuresKo":[],"nameJp":"迷宮の門番 ネブリス","nameKana":"メイキュウノモンバン ネブリス","nameKo":"미궁의 문지기 네브리스","textJp":"あなたは自分の控え室のキャラを1枚まで選び、手札に戻し、次の効果を行ってよい。『相手は自分のストックすべてを、山札に戻し、その山札をシャッフルし、自分の山札の上から同じ枚数をストック置場に置く。』","textKo":"당신은 자신의 대기실에서 캐릭터를 1장까지 골라 패로 되돌리고, 다음 효과를 실행해도 된다.『상대는 자신의 스톡 모두를 덱에 되돌리고, 그 덱을 셔플한 뒤, 자신의 덱 위에서 같은 매수를 스톡 존에 놓는다.』","translated":true,"variants":[{"number":"BRD/W139-T16","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t16.png"},{"number":"BRD/W139-T16S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t16s.png"}]},{"base":"BRD/W139-T17","sortNo":1017,"expKind":"trial","expLabel":"트라이얼덱","kind":"클라이맥스","kindRaw":"4","color":"blue.gif","colorKo":"파랑","level":"-","cost":"-","power":"-","soul":"-","trigger":"[[soul.gif]][[gate.gif]]","featuresJp":[],"featuresKo":[],"nameJp":"蒼き水の魔法","nameKana":"アオキミズノマホウ","nameKo":"푸른 물의 마법","textJp":"【永】 あなたのキャラすべてに、パワーを＋1000し、ソウルを＋1。\u003cbr>（[[gate.gif]]：このカードがトリガーした時、あなたは自分の控え室のCXを1枚選び、手札に戻してよい）","textKo":"【영속】 당신의 캐릭터 모두에게, 파워를 +1000하고 소울을 +1.\u003cbr>（[[gate.gif]]：이 카드가 트리거했을 때, 당신은 자신의 대기실에서 CX를 1장 골라 패로 되돌려도 된다）","translated":true,"variants":[{"number":"BRD/W139-T17","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t17.png"},{"number":"BRD/W139-T17S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t17r.png"}]}]};
(function(){
  const D = window.DATA;
  const G = D.glossary;
  const $ = (s,el)=> (el||document).querySelector(s);
  const $$ = (s,el)=> [...(el||document).querySelectorAll(s)];

  // ── 렌더 헬퍼 ──
  const esc = s => String(s==null?"":s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function iconHtml(f){
    const meta = G.icons[f]; const ko = meta ? meta.ko : f.replace('.gif','');
    return '<img class="ic" src="images/icons/'+f+'" alt="'+esc(ko)+'" title="'+esc(ko)+'">';
  }
  function renderText(str){
    if(!str || str==="-") return '<span style="color:var(--muted)">-</span>';
    return String(str).split(/<br\s*\/?>/i).map(seg=>{
      let h = esc(seg);
      h = h.replace(/\[\[([^\]]+)\]\]/g, (m,f)=>iconHtml(f));
      h = h.replace(/【([^】]+)】/g, '<span class="kw kw-ability">【$1】</span>');
      h = h.replace(/《([^》]+)》/g, '<span class="kw kw-trait">《$1》</span>');
      h = h.replace(/『([^』]+)』/g, '<span class="kw kw-quote">『$1』</span>');
      return h;
    }).join('<br>');
  }
  function icons(str){ // 소울/트리거 등 아이콘 나열 필드
    if(!str || str==="-") return '<span style="color:var(--muted)">-</span>';
    return String(str).replace(/\[\[([^\]]+)\]\]/g,(m,f)=>iconHtml(f));
  }

  // ── 헤더/통계 ──
  $('#hTitle').textContent = D.meta.title;
  $('#hSub').textContent = D.meta.subtitle;
  $('#hStats').innerHTML =
    '<span>기본카드 <b>'+D.meta.groupCount+'</b></span>'+
    '<span>총 <b>'+D.meta.totalCards+'</b>장</span>'+
    '<span>번역 <b id="trStat">'+D.meta.translatedCount+'</b>/'+D.meta.groupCount+'</span>';

  // ── 색상 칩 ──
  const COLORNAME = {'yellow.gif':'노랑','green.gif':'초록','red.gif':'빨강','blue.gif':'파랑'};
  const COLORVAR = {'yellow.gif':'var(--yellow)','green.gif':'var(--green)','red.gif':'var(--red)','blue.gif':'var(--blue)'};
  const colorChips = $('#colorChips');
  D.meta.colorsPresent.forEach(f=>{
    const c=document.createElement('span'); c.className='chip'; c.dataset.color=f;
    c.innerHTML='<span class="dot" style="background:'+(COLORVAR[f]||'#888')+'"></span>'+(COLORNAME[f]||f);
    c.addEventListener('click',()=>{c.classList.toggle('on'); apply();});
    colorChips.appendChild(c);
  });
  // 종류/레벨 옵션
  D.meta.kindsPresent.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k; $('#kindSel').appendChild(o); });
  [...new Set(D.groups.map(g=>g.level))].filter(v=>v&&v!=='-').sort().forEach(l=>{ const o=document.createElement('option'); o.value=l; o.textContent='레벨 '+l; $('#levelSel').appendChild(o); });

  // ── 카드 DOM ──
  const grid = $('#grid');
  function cardEl(g){
    const el=document.createElement('article'); el.className='card';
    const rep = g.variants.find(v=>v.isBase) || g.variants[0];
    const name = g.nameKo || g.nameJp;
    const untr = g.translated ? '' : '<span class="untr">미번역</span>';
    const feats = (g.featuresKo.length?g.featuresKo:g.featuresJp).map(f=>'<span class="feat">'+esc(f)+'</span>').join('');

    // 스탯 라인
    const parts=[];
    if(g.color) parts.push('<span class="kv">'+iconHtml(g.color)+esc(g.colorKo)+'</span>');
    parts.push('<span class="kind-tag">'+esc(g.kind)+'</span>');
    if(g.level && g.level!=='-') parts.push('<span class="kv">Lv <b>'+esc(g.level)+'</b></span>');
    if(g.cost && g.cost!=='-') parts.push('<span class="kv">코스트 <b>'+esc(g.cost)+'</b></span>');
    if(g.power && g.power!=='-') parts.push('<span class="kv">파워 <b>'+esc(g.power)+'</b></span>');
    if(g.soul && g.soul!=='-') parts.push('<span class="kv">소울 '+icons(g.soul)+'</span>');
    if(g.trigger && g.trigger!=='-') parts.push('<span class="kv">트리거 '+icons(g.trigger)+'</span>');
    parts.push('<span class="kv" style="opacity:.8">'+esc(g.expLabel)+'</span>');

    const jpBlock = '<div class="text jp" '+(showJP?'':'hidden')+'><b style="color:var(--muted)">日</b> '+renderText(g.textJp)+'</div>';

    el.innerHTML =
      '<div class="card-top">'+
        '<div class="thumb"><img loading="lazy" src="'+rep.img+'" alt="'+esc(name)+'" data-open="1"></div>'+
        '<div class="info">'+
          '<div class="name">'+esc(name)+untr+
            (showJP?'<span class="jp">'+esc(g.nameJp)+'</span>':'')+
            '<div class="base-no">'+esc(g.base)+' · '+g.variants.length+'종</div></div>'+
          '<div class="statline">'+parts.join('')+'</div>'+
          (feats?'<div class="features">'+feats+'</div>':'')+
          '<div class="text">'+renderText(g.textKo || g.textJp)+'</div>'+
          jpBlock+
        '</div>'+
      '</div>'+
      '<div class="variants">'+ g.variants.map((v,i)=>
        '<button class="var'+(v.isBase?' base':'')+'" data-vi="'+i+'">'+
          '<img loading="lazy" src="'+v.img+'" alt="'+esc(v.number)+'">'+
          '<span class="badge'+(v.parallel?' p':'')+'">'+esc(v.rare)+'</span>'+
          '<span class="vno">'+esc(v.number.split('-').pop())+'</span>'+
        '</button>').join('') +'</div>';

    // 라이트박스 바인딩
    el._group=g;
    $('.thumb img',el).addEventListener('click',()=>openLB(g, g.variants.indexOf(rep)));
    $$('.var',el).forEach(b=> b.addEventListener('click',()=>openLB(g, +b.dataset.vi)));
    return el;
  }

  // ── 필터 ──
  let showJP=false;
  const state={q:'',colors:new Set(),kind:'',level:'',exp:'',untr:false};
  function apply(){
    state.q = $('#q').value.trim().toLowerCase();
    state.colors = new Set($$('#colorChips .chip.on').map(c=>c.dataset.color));
    state.kind = $('#kindSel').value;
    state.level = $('#levelSel').value;
    state.exp = $('#expSel').value;
    state.untr = $('#untrChk').checked;
    let shown=0;
    for(const el of grid.children){
      const g=el._group;
      let ok=true;
      if(state.colors.size && !state.colors.has(g.color)) ok=false;
      if(ok && state.kind && g.kind!==state.kind) ok=false;
      if(ok && state.level && g.level!==state.level) ok=false;
      if(ok && state.exp && g.expKind!==state.exp) ok=false;
      if(ok && state.untr && g.translated) ok=false;
      if(ok && state.q){
        const hay=(g.nameKo+' '+g.nameJp+' '+g.nameKana+' '+g.base+' '+(g.textKo||'')+' '+g.textJp+' '+g.variants.map(v=>v.number).join(' ')).toLowerCase();
        if(!hay.includes(state.q)) ok=false;
      }
      el.hidden=!ok; if(ok) shown++;
    }
    $('#empty').hidden = shown>0;
  }
  function renderAll(){
    grid.innerHTML='';
    D.groups.forEach(g=> grid.appendChild(cardEl(g)));
    apply();
  }

  // ── 라이트박스 ──
  const lb=$('#lb'); let lbGroup=null, lbIdx=0;
  function openLB(g,i){ lbGroup=g; lbIdx=i; showLB(); lb.classList.add('on'); }
  function showLB(){
    const v=lbGroup.variants[lbIdx];
    $('#lbImg').src=v.img;
    $('#lbCap').innerHTML='<span class="r">'+esc(v.rare)+'</span> '+esc(v.rareKo)+' · '+esc(v.number)+' · '+esc(lbGroup.nameKo||lbGroup.nameJp)+' <span style="opacity:.6">('+(lbIdx+1)+'/'+lbGroup.variants.length+')</span>';
  }
  function step(d){ if(!lbGroup)return; lbIdx=(lbIdx+d+lbGroup.variants.length)%lbGroup.variants.length; showLB(); }
  $('#lbClose').onclick=()=>lb.classList.remove('on');
  $('#lbPrev').onclick=()=>step(-1);
  $('#lbNext').onclick=()=>step(1);
  lb.addEventListener('click',e=>{ if(e.target===lb) lb.classList.remove('on'); });
  document.addEventListener('keydown',e=>{
    if(!lb.classList.contains('on'))return;
    if(e.key==='Escape') lb.classList.remove('on');
    else if(e.key==='ArrowLeft') step(-1);
    else if(e.key==='ArrowRight') step(1);
  });

  // ── 이벤트 ──
  $('#q').addEventListener('input', apply);
  $('#kindSel').addEventListener('change', apply);
  $('#levelSel').addEventListener('change', apply);
  $('#expSel').addEventListener('change', apply);
  $('#untrChk').addEventListener('change', apply);
  $('#jpChk').addEventListener('change', e=>{ showJP=e.target.checked; renderAll(); });

  // 테마 토글
  const themeBtn=$('#themeBtn');
  const saved=localStorage.getItem('brd_theme'); if(saved) document.documentElement.dataset.theme=saved;
  themeBtn.onclick=()=>{
    const cur=document.documentElement.dataset.theme;
    const next = cur==='dark'?'light':(cur==='light'?'':'dark');
    if(next) document.documentElement.dataset.theme=next; else delete document.documentElement.dataset.theme;
    localStorage.setItem('brd_theme', next);
  };

  renderAll();
})();
</script>
</body>
</html>
