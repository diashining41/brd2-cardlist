<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>바이스슈발츠 카드리스트 (한글)</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --panel2:#f0f1f4; --border:#e2e4e9;
    --text:#1c1f26; --muted:#697086; --accent:#4c6ef5; --accent-soft:#e7ecfe;
    --badge:#333a4a; --shadow:0 1px 3px rgba(20,25,40,.08),0 4px 16px rgba(20,25,40,.06);
    --yellow:#e6b422; --green:#3fa860; --red:#e2564d; --blue:#4176d6;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14161c; --panel:#1c1f28; --panel2:#242835; --border:#2e3342;
      --text:#e7e9ef; --muted:#9aa1b4; --accent:#7c93ff; --accent-soft:#242c48;
      --badge:#3a4256; --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="dark"]{
    --bg:#14161c; --panel:#1c1f28; --panel2:#242835; --border:#2e3342;
    --text:#e7e9ef; --muted:#9aa1b4; --accent:#7c93ff; --accent-soft:#242c48;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#f4f5f7; --panel:#ffffff; --panel2:#f0f1f4; --border:#e2e4e9;
    --text:#1c1f26; --muted:#697086; --accent:#4c6ef5; --accent-soft:#e7ecfe;
    --shadow:0 1px 3px rgba(20,25,40,.08),0 4px 16px rgba(20,25,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    font-size:14px; line-height:1.55;
  }
  a{color:var(--accent)}

  /* ── Header ── */
  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(8px);
    background:color-mix(in srgb,var(--panel) 88%,transparent);
    border-bottom:1px solid var(--border);
  }
  .head-inner{max-width:1280px; margin:0 auto; padding:12px 18px}
  .title-row{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  h1{font-size:19px; margin:0; letter-spacing:-.2px}
  .subtitle{color:var(--muted); font-size:12.5px}
  .stats{margin-left:auto; color:var(--muted); font-size:12.5px; display:flex; gap:14px; flex-wrap:wrap}
  .stats b{color:var(--text)}

  /* ── Toolbar ── */
  .toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:11px}
  .search{
    flex:1 1 240px; min-width:180px; display:flex; align-items:center; gap:8px;
    background:var(--panel2); border:1px solid var(--border); border-radius:9px; padding:7px 11px;
  }
  .search input{border:0; background:transparent; color:var(--text); width:100%; font-size:13.5px; outline:none}
  .search svg{flex:none; opacity:.5}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    border:1px solid var(--border); background:var(--panel2); color:var(--text);
    border-radius:999px; padding:5px 12px; font-size:12.5px; cursor:pointer; user-select:none;
    display:inline-flex; align-items:center; gap:6px; transition:.12s;
  }
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600}
  .chip .dot{width:11px; height:11px; border-radius:50%; display:inline-block}
  select.ctl{
    border:1px solid var(--border); background:var(--panel2); color:var(--text);
    border-radius:9px; padding:6px 10px; font-size:12.5px; cursor:pointer;
  }
  .spacer{flex:1}

  /* ── Grid ── */
  main{max-width:1280px; margin:0 auto; padding:18px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px}
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column;
  }
  /* hidden 속성이 .card{display:flex}에 가려지지 않도록(필터 숨김이 확실히 먹도록) */
  .card[hidden]{ display:none }
  .card-top{display:flex; gap:13px; padding:13px}
  .thumb{flex:none; width:118px}
  .thumb img{width:100%; border-radius:7px; display:block; cursor:zoom-in; background:var(--panel2)}
  .info{min-width:0; flex:1}
  .name{font-weight:700; font-size:15px; line-height:1.35; letter-spacing:-.2px}
  .name .jp{display:block; font-weight:400; font-size:11.5px; color:var(--muted); margin-top:1px}
  .base-no{font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; margin-top:3px}
  .title-tag{font-family:inherit; font-weight:700; color:var(--accent); background:var(--accent-soft);
    border-radius:5px; padding:0 6px; margin-right:5px; font-size:10.5px}
  .untr{display:inline-block; font-size:10.5px; font-weight:700; color:#b26b00; background:#ffe9c2;
        border-radius:5px; padding:1px 6px; margin-left:6px; vertical-align:middle}
  @media (prefers-color-scheme: dark){.untr{color:#ffcf7a; background:#4a3410}}

  .statline{display:flex; gap:6px 9px; flex-wrap:wrap; margin:8px 0; align-items:center; font-size:12px; color:var(--muted)}
  .statline .kv{display:inline-flex; gap:4px; align-items:center; white-space:nowrap}
  .statline .kv b{color:var(--text); font-weight:600}
  .ic{height:15px; width:auto; vertical-align:-3px; image-rendering:auto}
  .kind-tag{border:1px solid var(--border); border-radius:5px; padding:0 6px; font-size:11px}

  .features{display:flex; gap:5px; flex-wrap:wrap; margin:7px 0}
  .feat{background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:1px 7px; font-size:11.5px; color:var(--muted)}

  .text{font-size:12.7px; line-height:1.62; margin-top:7px; word-break:break-word}
  .text.jp{color:var(--muted); font-size:12px; border-top:1px dashed var(--border); margin-top:8px; padding-top:7px}
  .kw{border-radius:4px; padding:0 2px}
  .kw-ability{color:var(--accent); font-weight:700}
  .kw-trait{color:var(--green); font-weight:600}
  .kw-quote{color:var(--muted)}

  /* ── Variant strip ── */
  .variants{display:flex; gap:7px; padding:10px 13px 13px; overflow-x:auto; border-top:1px solid var(--border); background:var(--panel2)}
  .var{
    flex:none; width:66px; border:0; background:transparent; padding:0; cursor:zoom-in; text-align:center;
    position:relative;
  }
  .var img{width:100%; border-radius:5px; display:block; border:1px solid var(--border); background:var(--panel)}
  .var.base img{outline:2px solid var(--accent)}
  .badge{
    position:absolute; top:3px; left:3px; font-size:9px; font-weight:800; letter-spacing:.2px;
    background:var(--badge); color:#fff; border-radius:4px; padding:1px 4px; line-height:1.3;
  }
  .badge.p{background:var(--accent)}
  .vno{display:block; font-size:9.5px; color:var(--muted); margin-top:2px; font-family:ui-monospace,monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .empty{text-align:center; color:var(--muted); padding:60px 0}

  /* ── 출처·면책 푸터 ── */
  .site-foot{max-width:1280px; margin:8px auto 0; padding:18px 18px 40px; border-top:1px solid var(--border);
    color:var(--muted); font-size:11.5px; line-height:1.7; text-align:center}
  .site-foot b{color:var(--text)}
  .site-foot .en{display:block; opacity:.7; margin-top:2px}
  .site-foot a{color:var(--muted); text-decoration:underline}

  /* ── Lightbox ── */
  .lb{position:fixed; inset:0; z-index:50; background:rgba(8,10,16,.86); display:none; align-items:center; justify-content:center}
  .lb.on{display:flex}
  .lb img{max-width:min(92vw,620px); max-height:88vh; border-radius:10px; box-shadow:0 10px 50px rgba(0,0,0,.6)}
  .lb-cap{position:fixed; bottom:22px; left:0; right:0; text-align:center; color:#fff; font-size:13px}
  .lb-cap .r{font-weight:700}
  .lb-nav{position:fixed; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.12); color:#fff;
          border:0; width:48px; height:64px; font-size:26px; cursor:pointer; border-radius:9px}
  .lb-prev{left:16px} .lb-next{right:16px}
  .lb-close{position:fixed; top:16px; right:18px; background:rgba(255,255,255,.12); color:#fff; border:0;
            width:40px; height:40px; border-radius:9px; font-size:20px; cursor:pointer}
  @media(max-width:520px){.lb-nav{width:38px}}
</style>
</head>

re":"SSP","rareKo":"슈퍼스페셜(SSP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_006ssp.png"}]},{"base":"BRD/W139-007","sortNo":7,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"3","cost":"2","power":"8500","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"純白の祝福 レピテア","nameKana":"ジュンパクノシュクフク レピテア","nameKo":"순백의 축복 레피테아","textJp":"【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋3000。\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロックの上から1枚を、控え室に置いてよい。\u003cbr>【自】【CXコンボ】［(2) 手札を1枚控え室に置く］ このカードのアタックの終わりに、CX置場に「一緒に幸せになろっ！」があるなら、あなたはコストを払ってよい。そうしたら、相手に3ダメージを与え、次の相手のターンの終わりまで、このカードのバトル中、あなたは相手のキャラの【自】の効果によるダメージを受けない。（ダメージキャンセルは発生する）","textKo":"【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +3000.\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장을 대기실에 놓아도 된다.\u003cbr>【자동】【CX콤보】［(2) 패를 1장 대기실에 놓는다］ 이 카드의 어택이 끝날 때, CX존에 「함께 행복해지자!」가 있다면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 3데미지를 주고, 다음 상대 턴이 끝날 때까지 이 카드의 배틀 중 당신은 상대 캐릭터의 【자동】 효과에 의한 데미지를 받지 않는다.（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-007","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_007.png"},{"number":"BRD/W139-007S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_007s.png"}]},{"base":"BRD/W139-008","sortNo":8,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"白い死神 ユースティア","nameKana":"シロイシニガミ ユースティア","nameKo":"하얀 사신 유스티아","textJp":"【自】 このカードが手札から舞台に置かれた時、次の行動を2回行う。『あなたは自分の山札を上から1枚見て、山札の上か控え室に置く。』\u003cbr>【自】［(1)］ あなたのトリガーアイコンが[[focus.gif]]のCXがトリガーした時、あなたはコストを払ってよい。そうしたら、あなたは自分の控え室の《RPG》のキャラを1枚選び、手札に戻す。\u003cbr>【起】［このカードを【レスト】する］ あなたは自分の《RPG》のキャラを1枚選び、そのターン中、パワーを＋1000。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 다음 행동을 2회 한다.『당신은 자신의 덱 위에서 1장을 보고, 덱 위나 대기실에 놓는다.』\u003cbr>【자동】［(1)］ 당신의 트리거 아이콘이 [[focus.gif]]인 CX가 트리거했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 대기실에서 《RPG》 캐릭터를 1장 골라 패로 되돌린다.\u003cbr>【기동】［이 카드를 【레스트】한다］ 당신은 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +1000.","translated":true,"variants":[{"number":"BRD/W139-008","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_008.png"},{"number":"BRD/W139-008S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_008s.png"}]},{"base":"BRD/W139-009","sortNo":9,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"浜辺の正義 ミカエラ","nameKana":"ハマベノセイギ ミカエラ","nameKo":"해변의 정의 미카엘라","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは他の自分の《RPG》のキャラを1枚選び、そのターン中、パワーを＋1000。\u003cbr>【起】［このカードをクロック置場に置く］ あなたは自分の山札を上から3枚まで見て、《RPG》のキャラかイベントを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 다른 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 파워를 +1000.\u003cbr>【기동】［이 카드를 클록 존에 놓는다］ 당신은 자신의 덱 위에서 3장까지 보고, 《RPG》 캐릭터나 이벤트를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.","translated":true,"variants":[{"number":"BRD/W139-009","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_009.png"},{"number":"BRD/W139-009S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_009s.png"},{"number":"BRD/W139-009SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_009sp.png"}]},{"base":"BRD/W139-010","sortNo":10,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"yellow.gif","colorKo":"노랑","level":"1","cost":"0","power":"1500","sou "kindRaw":"3","color":"yellow.gif","colorKo":"노랑","level":"1","cost":"0","power":"-","soul":"-","trigger":"-","featuresJp":[],"featuresKo":[],"nameJp":"ムネが躍るイタズラな夏","nameKana":"ムネガオドルイタズラナナツ","nameKo":"가슴 설레는 장난스러운 여름","textJp":"このカードは、あなたの《RPG》のキャラがいないか、あなたのレベルが3以上なら、手札からプレイできない。\u003cbr>あなたは相手のキャラを1枚選び、そのターン中、次の能力を与える。『【自】 このカードが舞台から控え室に置かれた時、あなたに1ダメージを与える。』（ダメージキャンセルは発生する）","textKo":"이 카드는, 당신의 《RPG》 캐릭터가 없거나 당신의 레벨이 3 이상이면 패에서 플레이할 수 없다.\u003cbr>당신은 상대 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【자동】 이 카드가 무대에서 대기실에 놓였을 때, 당신에게 1데미지를 준다.』（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-022","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_022.png"},{"number":"BRD/W139-022S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_022s.png"}]},{"base":"BRD/W139-023","sortNo":23,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"이벤트","kindRaw":"3","color":"yellow.gif","colorKo":"노랑","level":"2","cost":"0","power":"-","soul":"-","trigger":"-","featuresJp":[],"featuresKo":[],"nameJp":"メルトダウン・バニーズ","nameKana":"メルトダウン・バニーズ","nameKo":"멜트다운 버니즈","textJp":"このカードは、あなたの《RPG》のキャラが1枚以下なら、手札からプレイできない。このカードを思い出にする。\u003cbr>あなたの思い出置場の「メルトダウン・バニーズ」が2枚なら、あなたは自分の山札を上から4枚まで見て、《RPG》のキャラを2枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。\u003cbr>あなたの思い出置場の「メルトダウン・バニーズ」が3枚なら、相手に2ダメージを与える。（ダメージキャンセルは発生する）\u003cbr>あなたの思い出置場の「メルトダウン・バニーズ」が4枚なら、あなたは好きな数を宣言し、相手にＸダメージを与える。Ｘはあなたの宣言した数に等しい。（マイナスの数は宣言できない。ダメージキャンセルは発生する）","textKo":"이 카드는, 당신의 《RPG》 캐릭터가 1장 이하라면 패에서 플레이할 수 없다. 이 카드를 추억으로 한다.\u003cbr>당신의 추억 존의 「멜트다운 버니즈」가 2장이면, 당신은 자신의 덱 위에서 4장까지 보고, 《RPG》 캐릭터를 2장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.\u003cbr>당신의 추억 존의 「멜트다운 버니즈」가 3장이면, 상대에게 2데미지를 준다.（데미지 캔슬은 발생한다）\u003cbr>당신의 추억 존의 「멜트다운 버니즈」가 4장이면, 당신은 원하는 수를 선언하고, 상대에게 X데미지를 준다. X는 당신이 선언한 수와 같다.（마이너스 수는 선언할 수 없다. 데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-023","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img" 時、あなたは自分のクロックの上から1枚を、控え室に置いてよい。\u003cbr>【自】【CXコンボ】［(2) 手札を1枚控え室に置く］ このカードがアタックした時、CX置場に「POST：SUMMER KNIGHT」があるなら、あなたはコストを払ってよい。そうしたら、次の行動を2回まで行う。『あなたは自分の山札の上から1枚を公開し、相手にＸダメージを与える。Ｘはそのカードのソウルに等しい。あなたは公開したカードを控え室に置いてよい。』（イベントとCXのソウルは0として扱う。ダメージキャンセルは発生する。公開したカードを控え室に置かないなら元に戻す）","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 위에서 1장을 대기실에 놓아도 된다.\u003cbr>【자동】【CX콤보】［(2) 패를 1장 대기실에 놓는다］ 이 카드가 어택했을 때, CX존에 「POST：SUMMER KNIGHT」가 있다면, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 다음 행동을 2회까지 한다.『당신은 자신의 덱 위에서 1장을 공개하고, 상대에게 X데미지를 준다. X는 그 카드의 소울과 같다. 당신은 공개한 카드를 대기실에 놓아도 된다.』（이벤트와 CX의 소울은 0으로 취급한다. 데미지 캔슬은 발생한다. 공개한 카드를 대기실에 놓지 않는다면 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-029","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_029.png"},{"number":"BRD/W139-029S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_029s.png"},{"number":"BRD/W139-029SSP","rare":"SSP","rareKo":"슈퍼스페셜(SSP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_029ssp.png"}]},{"base":"BRD/W139-030","sortNo":30,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]][[soul.gif]]","trigger":"-","featuresJp":["RPG","オフィス"],"featuresKo":["RPG","오피스"],"nameJp":"契約奪取者 ルベンシア","nameKana":"ケイヤクダッシュシャ ルベンシア","nameKo":"계약 강탈자 루벤시아","textJp":"【自】［手札のトリガーアイコンが[[treasure.gif]]のCXを1枚控え室に置く］ このカードが手札から舞台に置かれた時か舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を上から5枚まで見て、《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、残りのカードを控え室に置く。\u003cbr>【自】 あなたのトリガーアイコンが[[treasure.gif]]のCXがCX置場に置かれた時、あなたは自分の山札を上から2枚まで見て、カードを2枚まで選び、山札の上に好きな順番で置き、残りのカードを控え室に置く。","textKo":"【자동】［패의 트리거 아이콘이 [[treasure.gif]]인 CX를 1장 대기실에 놓는다］ 이 카드가 패에서 무대에 놓였을 때나 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱 위에서 5장까지 보고, 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 남은 카드를 대기실에 놓는다.\u003cbr>【자동】 당신의 트리거 아이콘이 [[treasure.gif]]인 CX가 CX존에 놓였을 때 ラのレベル×500に等しい。\u003cbr>【自】 他のあなたの《RPG》のキャラかこのカードが手札から舞台に置かれた時、あなたは自分の山札を上から1枚見てよい。（見たカードは元に戻す）\u003cbr>【起】［このカードを【レスト】する］ あなたは自分のキャラを1枚選び、そのターン中、次の能力を与える。『【自】 このカードがアタックした時、あなたは自分の山札を上から1枚見て、山札の上か控え室に置く。』","textKo":"【영속】 응원 이 카드 앞의 당신의 캐릭터 모두에게, 파워를 +X. X는 그 캐릭터의 레벨×500과 같다.\u003cbr>【자동】 다른 당신의 《RPG》 캐릭터나 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 덱 위에서 1장을 봐도 된다.（본 카드는 원래대로 되돌린다）\u003cbr>【기동】［이 카드를 【레스트】한다］ 당신은 자신의 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【자동】 이 카드가 어택했을 때, 당신은 자신의 덱 위에서 1장을 보고 덱 위나 대기실에 놓는다.』","translated":true,"variants":[{"number":"BRD/W139-034","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_034.png"},{"number":"BRD/W139-034S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_034s.png"},{"number":"BRD/W139-034SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_034sp.png"}]},{"base":"BRD/W139-035","sortNo":35,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"green.gif","colorKo":"초록","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"水遊びの守護者 ジェニス","nameKana":"ミズアソビノシュゴシャ ジェニス","nameKo":"물놀이의 수호자 제니스","textJp":"【起】［このカードを【レスト】する］ あなたはキャラを2枚まで選び、そのターン中、《ロックオン》を与える。\u003cbr>【起】［(1) 手札の《RPG》のキャラを1枚控え室に置く］ あなたは自分のキャラを1枚選び、そのターン中、次の能力を与える。『【永】 このカードがアタックする時、あなたはかわりに相手の後列の《ロックオン》のキャラを1枚選び、このカードはそのキャラを防御キャラとしてフロントアタックしてよい。』","textKo":"【기동】［이 카드를 【레스트】한다］ 당신은 캐릭터를 2장까지 골라 그 턴 중 《록온》을 부여한다.\u003cbr>【기동】［(1) 패의 《RPG》 캐릭터를 1장 대기실에 놓는다］ 당신은 자신의 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【영속】 이 카드가 어택할 때, 당신은 대신 상대 뒷열의 《록온》 캐릭터를 1장 골라, 이 카드는 그 캐릭터를 방어 캐릭터로 하여 프론트어택해도 된다.』","translated":true,"variants":[{"number":"BRD/W139-035","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_035.png"},{"number":"BRD/W139-035S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"ima /W139-055","sortNo":55,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"メイドビキニ ルヴィア","nameKana":"メイドビキニ ルヴィア","nameKo":"메이드비키니 루비아","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【自】【CXコンボ】 あなたのCX置場に「シークレット・オーダー」が置かれた時、前列にこのカードがいて、他のあなたの《RPG》のキャラが3枚以上なら、次の相手のターンの終わりまで、このカードは次の2つの能力を得る。『【自】 このカードがアタックした時、あなたは自分の山札を上から2枚まで見て、カードを1枚選び、山札の上に置き、残りのカードを控え室に置く。』『【自】 このカードがフロントアタックされた時か舞台から控え室に置かれた時、あなたはこのカードを手札に戻してよい。』","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【자동】【CX콤보】 당신의 CX존에 「시크릿 오더」가 놓였을 때, 앞열에 이 카드가 있고 다른 당신의 《RPG》 캐릭터가 3장 이상이면, 다음 상대 턴이 끝날 때까지 이 카드는 다음 2개의 능력을 얻는다.『【자동】 이 카드가 어택했을 때, 당신은 자신의 덱 위에서 2장까지 보고, 카드를 1장 골라 덱 위에 놓고, 남은 카드를 대기실에 놓는다.』『【자동】 이 카드가 프론트어택당했을 때나 무대에서 대기실에 놓였을 때, 당신은 이 카드를 패로 되돌려도 된다.』","translated":true,"variants":[{"number":"BRD/W139-055","rare":"RR","rareKo":"더블레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_055.png"},{"number":"BRD/W139-055S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_055s.png"},{"number":"BRD/W139-055SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_055sp.png"}]},{"base":"BRD/W139-056","sortNo":56,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","未来"],"featuresKo":["RPG","미래"],"nameJp":"ファイアグラフィティ アナスタシア","nameKana":"ファイアグラフィティ アナスタシア","nameKo":"파이어 그래피티 아나스타시아","textJp":"【自】［(1) 手札のキャラを1枚控え室に置く］ あなたのCXフェイズの始めに、あなたはコストを払ってよい。そうしたら、あなたは相手のキャラを2枚選び、それぞれを【スタンド】して入れ替える。\u003cbr>【起】 集中 ［(1) このカードを【レスト】する］ あなたは自分の山札の上から4枚をめくり、控え室に置く。それらのカードのCX1枚につき、あなたは自分の控え室のキャラを1枚まで選び、手札に戻す。","textKo":"【자동】［(1) 패의 캐릭터를 1장 대기실에 놓는다］ 당신의 CX 페이즈 시작에, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 상대 캐릭터를 2장 골라, 각각을 【스탠드】해서 서로 바꾼다.\u003cbr>【기동】 집중 ［(1) 이 카드를 【레스트】한다］ 당신은 자신의 덱 위에서 4장을 넘겨 대기실에 놓는다. 그 카드들의 CX 1장당, 당신은 자신의 대기실에서 캐릭터를 1장까지 골라 패로 되돌린다.","translated":true,"variants":[{"number":"BRD/W139-056","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_056.png"},{"number":"BRD/W139-056S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_056s.png"}]},{"base":"BRD/W139-057","sortNo":57,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"0","power":"4000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"暗黒聖女 リベルタ","nameKana":"アンコクセイジョ リベルタ","nameKo":"암흑 성녀 리베르타","textJp":"【永】 あなたのターン中、他のあなたの《RPG》のキャラがいるなら、このカードのパワーを＋3000。\u003cbr>【起】［(1) このカードを控え室に置く］ あなたのレベルが3以上なら、あなたは相手のキャラを1枚選び、【スタンド】して相手の舞台のキャラのいない他の枠に動かすか、他の相手のキャラを1枚選び、それぞれを【スタンド】して入れ替える。","textKo":"【영속】 당신의 턴 중, 다른 당신의 《RPG》 캐릭터가 있다면, 이 카드의 파워를 +3000.\u003cbr>【기동】［(1) 이 카드를 대기실에 놓는다］ 당신의 레벨이 3 이상이면, 당신은 상대 캐릭터를 1장 골라 【스탠드】해서 상대 무대의 캐릭터가 없는 다른 칸으로 이동시키거나, 다른 상대 캐릭터를 1장 골라 각각을 【스탠드】해서 서로 바꾼다.","translated":true,"variants":[{"number":"BRD/W139-057","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_057.png"},{"number":"BRD/W139-057S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_057s.png"}]},{"base":"BRD/W139-058","sortNo":58,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"1","power":"3500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"最後の希望 ロエン","nameKana":"サイゴノキボウ ロエン","nameKo":"최후의 희망 로엔","textJp":"【永】 このカードの正面のキャラのコスト aturesJp":["RPG","現代"],"featuresKo":["RPG","현대"],"nameJp":"メイドネームR リアトリス","nameKana":"メイドネームR リアトリス","nameKo":"메이드네임R 리아트리스","textJp":"【永】 前列にこのカードがいるなら、あなたの《RPG》のキャラすべてに、パワーを＋1500。\u003cbr>【自】【CXコンボ】 あなたのアンコールステップの始めに、CX置場に「メイド・ラブ♡ファイヤー」があり、前列にこのカードがいるなら、次の2つの効果のうちあなたが選んだ1つを行う。『［(1) 手札を1枚控え室に置く］ あなたはコストを払ってよい。そうしたら、相手に2ダメージを与える。』『［(2) 手札を1枚控え室に置く］ あなたはコストを払ってよい。そうしたら、相手に3ダメージを与える。』（ダメージキャンセルは発生する）","textKo":"【영속】 앞열에 이 카드가 있다면, 당신의 《RPG》 캐릭터 모두에게 파워를 +1500.\u003cbr>【자동】【CX콤보】 당신의 앙코르 스텝 시작에, CX존에 「메이드 러브♡파이어」가 있고 앞열에 이 카드가 있다면, 다음 2개의 효과 중 당신이 고른 1개를 한다.『［(1) 패를 1장 대기실에 놓는다］ 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 2데미지를 준다.』『［(2) 패를 1장 대기실에 놓는다］ 당신은 코스트를 지불해도 된다. 그렇게 했다면, 상대에게 3데미지를 준다.』（데미지 캔슬은 발생한다）","translated":true,"variants":[{"number":"BRD/W139-060","rare":"R","rareKo":"레어","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_060.png"},{"number":"BRD/W139-060S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_060s.png"},{"number":"BRD/W139-060SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_060sp.png"}]},{"base":"BRD/W139-061","sortNo":61,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"温泉管理人 リベルタ","nameKana":"オンセンカンリニン リベルタ","nameKo":"온천 관리인 리베르타","textJp":"【自】［(1)］ あなたのトリガーアイコンが[[salvage.gif]]のCXがトリガーした時、あなたはコストを払ってよい。そうしたら、あなたは1枚引く。\u003cbr>【自】【CXコンボ】 あなたのCX置場に「これこそが真の楽園」が置かれた時、あなたは他の自分の《RPG》のキャラを1枚選び、そのターン中、次の能力を与える。『【自】 このカードがアタックした時、あなたは自分の山札の上から1枚を公開する。そのカードが《RPG》のキャラなら手札に加える。』（そうでないなら元に戻す）","textKo":"【자동】［(1)］ 당신의 트리거 아이콘이 [[salvage.gif]]인 CX가 트리거했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 1장 뽑는다.\u003cbr>【자동】【CX콤보】 당신의 CX존에 「이것이야말로 진정한 낙원」이 놓였을 때, 당신은 다른 자신의 《RPG》 캐릭터를 1장 골라 그 턴 중 다음 능력을 부여한다.『【자동】 이 카드가 어택했을 때, 당신은 자신의 덱 위에서 1장을 공개한다. 그 카드가 《RPG》 캐릭터라면 패에 넣는다.』（그렇지 않다면 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-061","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_061.png"},{"number":"BRD/W139-061S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_061s.png"}]},{"base":"BRD/W139-062","sortNo":62,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"0","cost":"0","power":"1000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"陸上部 部員 ロエン","nameKana":"リクジョウブ ブイン ロエン","nameKo":"육상부 부원 로엔","textJp":"【自】［(1) 手札を1枚控え室に置く］ このカードが手札から舞台に置かれた時かアタックした時、あなたはコストを払ってよい。そうしたら、あなたは自分の山札を見て《RPG》のキャラを1枚まで選んで相手に見せ、手札に加え、その山札をシャッフルする。\u003cbr>【自】 このカードが【リバース】した時、このカードのバトル相手のレベルが0以下なら、あなたはそのキャラを【リバース】してよい。","textKo":"【자동】［(1) 패를 1장 대기실에 놓는다］ 이 카드가 패에서 무대에 놓였을 때나 어택했을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 당신은 자신의 덱을 보고 《RPG》 캐릭터를 1장까지 골라 상대에게 보여주고 패에 넣고, 그 덱을 셔플한다.\u003cbr>【자동】 이 카드가 【리버스】했을 때, 이 카드의 배틀 상대의 레벨이 0 이하라면, 당신은 그 캐릭터를 【리버스】해도 된다.","translated":true,"variants":[{"number":"BRD/W139-062","rare":"U","rareKo":"언커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_062.png"},{"number":"BRD/W139-062S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_062s.png"}]},{"base":"BRD/W139-063","sortNo":63,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"1","cost":"1","power":"6000","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"ロデブの星 リアトリス","nameKana":"ロデブノホシ リアトリス","nameKo":"로데브의 별 리아트리스","textJp":"【永】 あなたのキャラすべてが《RPG》なら、このカードのパワーを＋1500し、このカードは『【自】 アンコール ［手札のキャラを1枚控え室に置く］』を得る。","textKo":"【영속】 당신의 캐릭터 모두가 《RPG》라면, 이 카드의 파워를 +1500하고 이 카드는 『【자동】 앙코르 ［패의 캐릭터를 1장 대기실에 놓는다］』를 얻는다.","tran +4000.\u003cbr>【자동】【CX콤보】 이 카드의 배틀 상대가 【리버스】했을 때, 당신의 CX존에 「이교의 탑」이 있고 다른 당신의 《RPG》 캐릭터가 있다면, 다음 3개의 효과를 1회씩 실행한다.『당신은 자신의 대기실에서 《RPG》 캐릭터를 1장 골라 패로 되돌려도 된다.』『당신은 자신의 패의 카드와 레벨 존의 《RPG》 캐릭터를 1장씩 골라 서로 바꿔도 된다.』『당신은 자신의 스톡 위에서 1장을 패로 되돌려도 된다. 그렇게 했다면, 당신은 자신의 패를 1장 골라 스톡 존에 놓는다.』","translated":true,"variants":[{"number":"BRD/W139-094","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_094.png"},{"number":"BRD/W139-094S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_094s.png"},{"number":"BRD/W139-094SP","rare":"SP","rareKo":"사인(SP)","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_094sp.png"}]},{"base":"BRD/W139-095","sortNo":95,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"2","cost":"1","power":"4000","soul":"[[soul.gif]][[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","学校"],"featuresKo":["RPG","학교"],"nameJp":"風紀委員会 グレイシア","nameKana":"フウキイインカイ グレイシア","nameKo":"풍기위원회 그레이시아","textJp":"【自】 このカードが【リバース】した時、このカードのバトル相手のレベルが相手のレベルより高いなら、あなたはそのキャラを山札の下に置いてよい。\u003cbr>【自】 アンコール ［手札の《RPG》のキャラを1枚控え室に置く］ （このカードが舞台から控え室に置かれた時、あなたはコストを払ってよい。そうしたら、このカードがいた枠に【レスト】して置く）","textKo":"【자동】 이 카드가 【리버스】했을 때, 이 카드의 배틀 상대의 레벨이 상대 레벨보다 높다면, 당신은 그 캐릭터를 덱 아래에 놓아도 된다.\u003cbr>【자동】 앙코르 ［패의 《RPG》 캐릭터를 1장 대기실에 놓는다］ （이 카드가 무대에서 대기실에 놓였을 때, 당신은 코스트를 지불해도 된다. 그렇게 했다면, 이 카드가 있던 칸에 【레스트】해서 놓는다）","translated":true,"variants":[{"number":"BRD/W139-095","rare":"C","rareKo":"커먼","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_095.png"},{"number":"BRD/W139-095S","rare":"SR","rareKo":"스페셜레어","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_095s.png"}]},{"base":"BRD/W139-096","sortNo":96,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"booster","expLabel":"부스터","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"2","cost":"1","power":"55 s/b/brd_w139/brd_w139_t05s.png"}]},{"base":"BRD/W139-T06","sortNo":1006,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"9000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","童話"],"featuresKo":["RPG","동화"],"nameJp":"スノーホワイト ヴェンタナ","nameKana":"スノーホワイト ヴェンタナ","nameKo":"스노우 화이트 벤타나","textJp":"【永】 他のあなたの《RPG》のキャラが2枚以上なら、このカードのパワーを＋2500し、このカードは次の能力を得る。『【永】 このカードのバトル中、あなたは相手のキャラの【自】の効果によるダメージを受けない。』\u003cbr>【自】 このカードが手札から舞台に置かれた時、あなたは自分の山札を上からＸ枚まで見て、カードを1枚まで選び、手札に加え、残りのカードを控え室に置く。Ｘはあなたの《RPG》のキャラの枚数に等しい。","textKo":"【영속】 다른 당신의 《RPG》 캐릭터가 2장 이상이면, 이 카드의 파워를 +2500하고 이 카드는 다음 능력을 얻는다.『【영속】 이 카드의 배틀 중, 당신은 상대 캐릭터의 【자동】 효과에 의한 데미지를 받지 않는다.』\u003cbr>【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 덱 위에서 X장까지 보고, 카드를 1장까지 골라 패에 넣고, 남은 카드를 대기실에 놓는다. X는 당신의 《RPG》 캐릭터의 매수와 같다.","translated":true,"variants":[{"number":"BRD/W139-T06","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t06.png"},{"number":"BRD/W139-T06S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t06s.png"}]},{"base":"BRD/W139-T07","sortNo":1007,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"red.gif","colorKo":"빨강","level":"3","cost":"2","power":"9000","soul":"[[soul.gif]][[soul.gif]]","trigger":"[[soul.gif]]","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"鮮血の騎士 ユースティア","nameKana":"センケツノキシ ユースティア","nameKo":"선혈의 기사 유스티아","textJp":"【自】 このカードが手札から舞台に置かれた時、あなたは自分のクロック置場の《RPG》のキャラを1枚まで選び、山札の上か控え室に置く。\u003cbr>【自】【CXコンボ】 このカードがアタックした時、CX置場に「悪を退けるのが、我が使命」があるなら、そのターン中、このカードのパワーを＋3000し、あなたは自分の山札の上から1枚を公開する。そのカードが《RPG》のキャラなら、相手に3ダメージを与える。（ダメージキャンセルは発生する。公開したカードは元に戻す）","textKo":"【자동】 이 카드가 패에서 무대에 놓였을 때, 당신은 자신의 클록 존의 《RPG》 캐릭터를 1장까지 골라 덱 위나 대기실에 놓는다.\u003cbr>【자동】【CX콤보】 이 카드가 어택했을 때, CX존에 「악을 물리치는 것이, 나의 사명」이 있다면, 그 턴 중 이 카드의 파워를 +3000하고, 당신은 자신의 덱 위에서 1장을 공개한다. 그 카드가 《RPG》 캐릭터라면, 상대에게 3데미지를 준다.（데미지 캔슬은 발생한다. 공개한 카드는 원래대로 되돌린다）","translated":true,"variants":[{"number":"BRD/W139-T07","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t07.png"},{"number":"BRD/W139-T07S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t07s.png"},{"number":"BRD/W139-T07SP","rare":"TDSP","rareKo":"트라이얼덱 사인","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t07sp.png"}]},{"base":"BRD/W139-T08","sortNo":1008,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"trial","expLabel":"트라이얼덱","kind":"클라이맥스","kindRaw":"4","color":"red.gif","colorKo":"빨강","level":"-","cost":"-","power":"-","soul":"-","trigger":"[[salvage.gif]]","featuresJp":[],"featuresKo":[],"nameJp":"悪を退けるのが、我が使命","nameKana":"アクヲシリゾケルノガ、ワガシメイ","nameKo":"악을 물리치는 것이, 나의 사명","textJp":"【永】 あなたのキャラすべてに、パワーを＋1000し、ソウルを＋1。\u003cbr>（[[salvage.gif]]：このカードがトリガーした時、あなたは自分の控え室のキャラを1枚選び、手札に戻してよい）","textKo":"【영속】 당신의 캐릭터 모두에게, 파워를 +1000하고 소울을 +1.\u003cbr>（[[salvage.gif]]：이 카드가 트리거했을 때, 당신은 자신의 대기실에서 캐릭터를 1장 골라 패로 되돌려도 된다）","translated":true,"variants":[{"number":"BRD/W139-T08","rare":"TD","rareKo":"트라이얼덱","isBase":true,"parallel":false,"img":"images/b/brd_w139/brd_w139_t08.png"},{"number":"BRD/W139-T08S","rare":"TDP","rareKo":"트라이얼덱 패러렐","isBase":false,"parallel":true,"img":"images/b/brd_w139/brd_w139_t08r.png"}]},{"base":"BRD/W139-T09","sortNo":1009,"titleKey":"BRD","titleLabel":"브라운더스트2","expKind":"trial","expLabel":"트라이얼덱","kind":"캐릭터","kindRaw":"2","color":"blue.gif","colorKo":"파랑","level":"0","cost":"0","power":"500","soul":"[[soul.gif]]","trigger":"-","featuresJp":["RPG","オリジナル"],"featuresKo":["RPG","오리지널"],"nameJp":"使徒 モルフェア","nameKana":"シト モルフェア","nameKo":"사도 모르페아","textJp":"【自】 相手のCXがCX置場に置かれた時、あなたはこのカードをストック置場に置いてよい。\u003cbr>【起】 集中 ［(1) このカードを【レスト】する］ あなたは自分の山札の上から5枚をめくり、控え室に置く。それらのカードのCX1枚につき、あなたは1枚まで引く。","textKo":"【자동】 상대의 CX가 CX존에 놓였을 때 (function(){
  const D = window.DATA;
  const G = D.glossary;
  const $ = (s,el)=> (el||document).querySelector(s);
  const $$ = (s,el)=> [...(el||document).querySelectorAll(s)];

  // ── 렌더 헬퍼 ──
  const esc = s => String(s==null?"":s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function iconHtml(f){
    const meta = G.icons[f]; const ko = meta ? meta.ko : f.replace('.gif','');
    return '<img class="ic" src="images/icons/'+f+'" alt="'+esc(ko)+'" title="'+esc(ko)+'">';
  }
  function renderText(str){
    if(!str || str==="-") return '<span style="color:var(--muted)">-</span>';
    return String(str).split(/<br\s*\/?>/i).map(seg=>{
      let h = esc(seg);
      h = h.replace(/\[\[([^\]]+)\]\]/g, (m,f)=>iconHtml(f));
      h = h.replace(/【([^】]+)】/g, '<span class="kw kw-ability">【$1】</span>');
      h = h.replace(/《([^》]+)》/g, '<span class="kw kw-trait">《$1》</span>');
      h = h.replace(/『([^』]+)』/g, '<span class="kw kw-quote">『$1』</span>');
      return h;
    }).join('<br>');
  }
  function icons(str){ // 소울/트리거 등 아이콘 나열 필드
    if(!str || str==="-") return '<span style="color:var(--muted)">-</span>';
    return String(str).replace(/\[\[([^\]]+)\]\]/g,(m,f)=>iconHtml(f));
  }

  // ── 헤더/통계 ──
  $('#hTitle').textContent = D.meta.title;
  $('#hSub').textContent = D.meta.subtitle;
  $('#hStats').innerHTML =
    '<span>기본카드 <b>'+D.meta.groupCount+'</b></span>'+
    '<span>총 <b>'+D.meta.totalCards+'</b>장</span>'+
    '<span>번역 <b id="trStat">'+D.meta.translatedCount+'</b>/'+D.meta.groupCount+'</span>';

  // ── 색상 칩 ──
  const COLORNAME = {'yellow.gif':'노랑','green.gif':'초록','red.gif':'빨강','blue.gif':'파랑'};
  const COLORVAR = {'yellow.gif':'var(--yellow)','green.gif':'var(--green)','red.gif':'var(--red)','blue.gif':'var(--blue)'};
  const colorChips = $('#colorChips');
  D.meta.colorsPresent.forEach(f=>{
    const c=document.createElement('span'); c.className='chip'; c.dataset.color=f;
    c.innerHTML='<span class="dot" style="background:'+(COLORVAR[f]||'#888')+'"></span>'+(COLORNAME[f]||f);
    c.addEventListener('click',()=>{c.classList.toggle('on'); apply();});
    colorChips.appendChild(c);
  });
  // 작품(타이틀) 옵션 — 작품이 하나뿐이면 필터 숨김
  (D.meta.titlesPresent||[]).forEach(t=>{ const o=document.createElement('option'); o.value=t.key; o.textContent=t.label+' ('+t.count+')'; $('#titleSel').appendChild(o); });
  if((D.meta.titlesPresent||[]).length<=1) $('#titleSel').style.display='none';
  // 종류/레벨 옵션
  D.meta.kindsPresent.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k; $('#kindSel').appendChild(o); });
  [...new Set(D.groups.map(g=>g.level))].filter(v=>v&&v!=='-').sort().forEach(l=>{ const o=document.createElement('option'); o.value=l; o.textContent='레벨 '+l; $('#levelSel').appendChild(o); });

  // ── 카드 DOM ──
  const grid = $('#grid');
  function cardEl(g){
    const el=document.createElement('article'); el.className='card';
    const rep = g.variants.find(v=>v.isBase) || g.variants[0];
    const name = g.nameKo || g.nameJp;
    const untr = g.translated ? '' : '<span class="untr">미번역</span>';
    const feats = (g.featuresKo.length?g.featuresKo:g.featuresJp).map(f=>'<span class="feat">'+esc(f)+'</span>').join('');

    // 스탯 라인
    const parts=[];
    if(g.color) parts.push('<span class="kv">'+iconHtml(g.color)+esc(g.colorKo)+'</span>');
    parts.push('<span class="kind-tag">'+esc(g.kind)+'</span>');
    if(g.level && g.level!=='-') parts.push('<span class="kv">Lv <b>'+esc(g.level)+'</b></span>');
    if(g.cost && g.cost!=='-') parts.push('<span class="kv">코스트 <b>'+esc(g.cost)+'</b></span>');

    parts.push('<span class="kv" style="opacity:.8">'+esc(g.expLabel)+'</span>');

    const jpBlock = '<div class="text jp" '+(showJP?'':'hidden')+'><b style="color:var(--muted)">日</b> '+renderText(g.textJp)+'</div>';

        '<div class="thumb"><img loading="lazy" src="'+rep.img+'" alt="'+esc(name)+'" data-open="1"></div>'+
        '<div class="info">'+
          '<div class="name">'+esc(name)+untr+

            '<div class="base-no"><span class="title-tag">'+esc(g.titleLabel)+'</span>'+esc(g.base)+' · '+g.variants.length+'종</div></div>'+
          '<div class="statline">'+parts.join('')+'</div>'+
          (feats?'<div class="features">'+feats+'</div>':'')+
          '<div class="text">'+renderText(g.textKo || g.textJp)+'</div>'+
          jpBlock+
        '</div>'+
      '</div>'+
      '<div class="variants">'+ g.variants.map((v,i)=>

          '<span class="badge'+(v.parallel?' p':'')+'">'+esc(v.rare)+'</span>'+

    // 라이트박스 바인딩
    el._group=g;
    $('.thumb img',el).addEventListener('click',()=>openLB(g, g.variants.indexOf(rep)));

    return el;
  }

  // ── 필터 ──
  let showJP=false;
  const state={q:'',title:'',colors:new Set(),kind:'',level:'',exp:'',untr:false};
  function apply(){
    state.q = $('#q').value.trim().toLowerCase();

    state.colors = new Set($$('#colorChips .chip.on').map(c=>c.dataset.color));
    state.kind = $('#kindSel').value;
    state.level = $('#levelSel').value;
    state.exp = $('#expSel').value;
    state.untr = $('#untrChk').checked;
    let shown=0;
    for(const el of grid.children){
      const g=el._group;
      let ok=true;
      if(state.title && g.titleKey!==state.title) ok=false;
      if(ok && state.colors.size && !state.colors.has(g.color)) ok=false;
      if(ok && state.kind && g.kind!==state.kind) ok=false;
      if(ok && state.level && g.level!==state.level) ok=false;
      if(ok && state.exp && g.expKind!==state.exp) ok=false;
      if(ok && state.untr && g.translated) ok=false;
      if(ok && state.q){
        const hay=(g.titleLabel+' '+g.nameKo+' '+g.nameJp+' '+g.nameKana+' '+g.base+' '+(g.textKo||'')+' '+g.textJp+' '+g.variants.map(v=>v.number).join(' ')).toLowerCase();
        if(!hay.includes(state.q)) ok=false;
      }
      el.hidden=!ok; if(ok) shown++;
    }
    $('#empty').hidden = shown>0;
  }
  function renderAll(){
    grid.innerHTML='';
    D.groups.forEach(g=> grid.appendChild(cardEl(g)));
    apply();
  }

  // ── 라이트박스 ──
  const lb=$('#lb'); let lbGroup=null, lbIdx=0;
  function openLB(g,i){ lbGroup=g; lbIdx=i; showLB(); lb.classList.add('on'); }
  function showLB(){
    const v=lbGroup.variants[lbIdx];
    $('#lbImg').src=v.img;
    $('#lbCap').innerHTML='<span class="r">'+esc(v.rare)+'</span> '+esc(v.rareKo)+' · '+esc(v.number)+' · '+esc(lbGroup.nameKo||lbGroup.nameJp)+' <span style="opacity:.6">('+(lbIdx+1)+'/'+lbGroup.variants.length+')</span>';
  }
  function step(d){ if(!lbGroup)return; lbIdx=(lbIdx+d+lbGroup.variants.length)%lbGroup.variants.length; showLB(); }
  $('#lbClose').onclick=()=>lb.classList.remove('on');
  $('#lbPrev').onclick=()=>step(-1);
  $('#lbNext').onclick=()=>step(1);
  lb.addEventListener('click',e=>{ if(e.target===lb) lb.classList.remove('on'); });
  document.addEventListener('keydown',e=>{
    if(!lb.classList.contains('on'))return;
    if(e.key==='Escape') lb.classList.remove('on');
    else if(e.key==='ArrowLeft') step(-1);
    else if(e.key==='ArrowRight') step(1);
  });

  // ── 이벤트 ──
  $('#q').addEventListener('input', apply);
  $('#titleSel').addEventListener('change', apply);
  $('#kindSel').addEventListener('change', apply);
  $('#levelSel').addEventListener('change', apply);
  $('#expSel').addEventListener('change', apply);
  $('#untrChk').addEventListener('change', apply);
  $('#jpChk').addEventListener('change', e=>{ showJP=e.target.checked; renderAll(); });

  // 테마 토글
  const themeBtn=$('#themeBtn');
  const saved=localStorage.getItem('brd_theme'); if(saved) document.documentElement.dataset.theme=saved;
  themeBtn.onclick=()=>{
    const cur=document.documentElement.dataset.theme;
    const next = cur==='dark'?'light':(cur==='light'?'':'dark');
    if(next) document.documentElement.dataset.theme=next; else delete document.documentElement.dataset.theme;
    localStorage.setItem('brd_theme', next);
  };

  renderAll();
})();
</script>
</body>
</html>
